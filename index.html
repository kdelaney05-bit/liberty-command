/* ── 9. EFFORT · TOUCHES — the one new card in v1. Same meter-row language as
      Sales by Rep. Goal comes from rep_targets.daily_touch_goal (a real row per
      rep); points come from each play's own score_components.weight. Nothing
      here is inferred from sales outcomes: effort is what a rep did, not what
      happened to close. ─────────────────────────────────────────────────────── */
function cardEffort(){
  const E = D.effort;
  const K = EFFWIN, span = E.spans[K] || 1;
  const label = { day:'today', week:'this week', month:'this month', year:'this year' }[K];
  const live = E.rows.some(r => r[K].t > 0);
  // Ranked by touches in the window, points breaking ties. Reps who logged
  // nothing still appear — a scoreboard that hides its zeros is not a scoreboard.
  const ranked = [...E.rows].sort((a,b) => b[K].t - a[K].t || b[K].p - a[K].p || a.name.localeCompare(b.name));
  const logged = ranked.filter(r => r[K].t > 0);
  const silent = ranked.length - logged.length;
  const teamT = ranked.reduce((n,r) => n + r[K].t, 0);
  const teamP = ranked.reduce((n,r) => n + r[K].p, 0);
  const goalEach = (E.defaultGoal||0) * span;
  return `<div class="card full">
    <div class="card-title">Effort · scoreboard<span class="feed-tag ${live?'':'none'}">${live?'live · app':'awaiting logging'}</span></div>
    <div class="card-sub">Touches logged in the field app, ranked. Meter is each rep against their own goal for ${label} — ${span} working day${span===1?'':'s'} at ${E.defaultGoal}/day.</div>

    <div class="seg">
      ${[['day','Day'],['week','Week'],['month','Month'],['year','Year']]
        .map(([k,l])=>`<button class="${k===K?'on':''}" onclick="setEff('${k}')">${l}</button>`).join('')}
    </div>
    ${K === 'week' ? weekResetNote() : ''}

    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-tile"><div class="lbl">Touches ${esc(label)}</div>
        <div class="val ${teamT?'green':''}">${teamT}</div>
        <div class="sub">team goal ${goalEach*E.activeReps}</div></div>
      <div class="stat-tile"><div class="lbl">Production points</div>
        <div class="val ${teamP?'gold':''}">${teamP}</div>
        <div class="sub">${E.plays[0]?.weight||25} per play</div></div>
      <div class="stat-tile"><div class="lbl">Reps on the board</div>
        <div class="val ${logged.length?'blue':''}">${logged.length}<span style="font-size:14px;color:var(--text-dim)"> / ${E.activeReps}</span></div>
        <div class="sub">logged ${esc(label)}</div></div>
      <div class="stat-tile"><div class="lbl">Team goal hit</div>
        <div class="val ${goalEach&&teamT>=goalEach*E.activeReps?'green':''}">${goalEach?Math.round(teamT/(goalEach*E.activeReps)*100):0}%</div>
        <div class="sub">of ${goalEach*E.activeReps} expected</div></div>
    </div>

    ${logged.map((r,i) => {
      const goal = (r.goal||0) * span;
      const p = goal ? Math.min(100, Math.round(r[K].t / goal * 100)) : 0;
      return `<div class="rep-row">
        <div class="rep-head">
          <div class="nm"><span class="rk ${i===0?'top':''}">${i+1}</span>${esc(r.name)}${r.role&&r.role!=='sales'?`<span class="brand">${esc(r.role)}</span>`:''}</div>
          <div class="amt">${r[K].t} <span>· ${r[K].p} pts</span></div>
        </div>
        <div class="meter"><div class="meter-fill" style="width:${p}%;background:${p>=100?'#6cc28b':'#6ba8c9'}"></div></div>
        <div class="tgt-cap"><span>${r[K].t} of ${goal} goal</span>
          <span class="${p>=100?'hit':'miss'}">${p}%</span></div>
      </div>`}).join('')}

    ${silent ? `<div class="withheld"><div class="wt">${logged.length?'Not on the board':'Honest zero'}</div><div class="wx">
      ${silent} of ${E.activeReps} active rep${silent===1?' has':'s have'} logged nothing ${esc(label)}${logged.length?'':' — and nobody has'}. Touch logging begins when reps go live: <b>zeros are real</b>, not a broken feed. Nothing is back-filled from sales activity, so a rep who closed work but logged no touches ranks at zero, because that is what the effort data says.</div></div>` : ''}

    <div class="note">Goal is <b>rep_targets.daily_touch_goal</b>, a real row per rep — all ${E.activeReps} currently sit at the company default of <b>${E.defaultGoal}/day</b>${E.goalsAllDefault?', none set their own yet':''}. Points are each play's own weight in <b>score_components</b> (${E.plays.map(p=>esc(p.title)).join(', ')} — ${E.plays[0]?.weight} each); Until Yes repeats, so its repeats count again. Goals are scaled by working days, not calendar days, or a Monday would read as a whole week missed.</div>
  </div>`;
}

/* ── LEAD SOURCES · MARKETING. The ids are complete on every job; the names are
      what CC will not return. Shown by id rather than withheld, because which
      ids carry the revenue is exactly what decides which ones are worth
      naming. ─────────────────────────────────────────────────────────────── */
/* Kevin: "Make sure we seperate lead sources by trade. Fencing and roofing are
   different animals." One trade at a time, never a blended company-wide list. */
function cardLeads(){
  const L = D.leadSources;
  const T = L.byTrade[LEADTRADE] || { allTime:[], windows:{}, distinct:0, namedIds:0, namedRevShare:0, jobs:0 };
  const m = brandOf(LEADTRADE);
  const rows = (T.windows[LEADWIN] || []).slice(0, 12);
  const label = { day:'today', week:'this week', month:'this month', ytd:'year to date' }[LEADWIN];
  const tot = rows.reduce((n,r) => n + r.rev, 0);
  const mx = Math.max(1, ...rows.map(r => r.rev));
  /* Unmapped share for THIS company, all-time, by signed value. The map now
     covers Fencing and Pro-Tec effectively in full; Oasis is the outlier — one
     dropdown id (#35082) carries the majority of its signed value with no name
     in our sync, though the office masterlist shows real values for it. The
     "#none" bucket (no source set at all) is a different thing from an unnamed
     id and is not lumped in with it. */
  const unmappedAll = T.allTime.filter(r => !r.name && r.id !== 'none');
  const unmappedRevAll = unmappedAll.reduce((n,r) => n + r.rev, 0);
  const revAll = T.allTime.reduce((n,r) => n + r.rev, 0);
  const biggestUnmapped = [...unmappedAll].sort((a,b) => b.rev - a.rev)[0];
  return `<div class="card full">
    <div class="card-title">Leads by source<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">Fencing and roofing buy leads in different markets, so this is one trade at a time — never a blended list. Close rate is that source's contracts against every lead it has produced.</div>

    <div class="seg">
      ${BRAND_ORDER.map(b=>`<button class="${b===LEADTRADE?'on':''}" onclick="setTrade('${b}')">${esc(brandOf(b).s)}</button>`).join('')}
    </div>
    <div class="seg">
      ${[['day','Day'],['week','Week'],['month','Month'],['ytd','YTD']]
        .map(([k,l])=>`<button class="${k===LEADWIN?'on':''}" onclick="setLead('${k}')">${l}</button>`).join('')}
    </div>

    <div class="tradehead">
      <span class="tdot" style="background:${m.c}"></span>${esc(m.n)}
      <span class="tmeta">${T.jobs.toLocaleString()} leads · ${T.distinct} sources · ${T.namedIds} named</span>
    </div>

    ${rows.length ? rows.map(r => {
      const all = T.allTime.find(a => a.id === r.id);
      const conv = all && all.jobs ? Math.round(all.signed / all.jobs * 100) : null;
      return `<div class="rep-row">
        <div class="rep-head">
          <div class="nm">${r.name ? esc(r.name) : (r.id==='none'?'No source on the job':'#'+esc(r.id))}
            ${r.name ? (r.category?`<span class="brand">${esc(r.category)}${r.inferred?' ·inferred':''}</span>`:'')
                     : '<span class="brand">unmapped</span>'}</div>
          <div class="amt">${short(r.rev)} <span>· ${r.signed} signed</span></div>
        </div>
        <div class="meter"><div class="meter-fill" style="width:${Math.round(r.rev/mx*100)}%;background:${r.name?(r.rev===mx?m.c:'#6ba8c9'):'#8aa094'}"></div></div>
        <div class="tgt-cap">
          <span>${pct(r.rev,tot)}% of ${esc(m.s)} signed ${esc(label)}${all?` · ${all.jobs.toLocaleString()} leads all time`:''}</span>
          <span class="${conv===null?'':conv>=50?'hit':''}">${conv===null?'':conv+'% close'}</span>
        </div>
      </div>`}).join('') : `<div class="card-sub" style="margin:0">${esc(m.n)} signed nothing ${esc(label)} to attribute.</div>`}

    ${unmappedRevAll > 0 ? `<div class="withheld"><div class="wt">${(100-T.namedRevShare) >= 40 ? 'Most of this company sits on an unnamed source' : 'Not every source is named'}</div><div class="wx">
      <b>${short(unmappedRevAll)}</b> of ${esc(m.s)}'s signed value — <b>${pct(unmappedRevAll,revAll)}%</b> of it — sits on ${unmappedAll.length===1?'a source id':'source ids'} our sync carries no name for${biggestUnmapped?`, nearly all of it on <b>#${esc(biggestUnmapped.id)}</b> (${biggestUnmapped.jobs.toLocaleString()} leads · ${short(biggestUnmapped.rev)} signed)`:''}. The office masterlist shows real values for these — Google, Saving Safari and the like — but the warehouse has not mapped them yet, so they keep their raw id rather than being folded into "other". A source you cannot name is still one you are paying for.</div></div>` : ''}

    <div class="note">${esc(m.n)}: <b>${T.namedIds} of ${T.distinct}</b> sources named, covering <b>${T.namedRevShare}%</b> of its signed value. The map now holds <b>${L.mapSize}</b> names and covers Fencing and Pro-Tec effectively in full; Oasis is the one still leaning on an unmapped dropdown id. Categories marked <b>·inferred</b> were guessed rather than set by hand, so a guess never reads as a decision.</div>
  </div>`;
}

/* Channel view — the question "which kind of marketing earns" rather than
   "which individual source". Categories come from the same map. */
function cardLeadCategories(){
  const cats = D.leadSources.categories.filter(c=>c.rev>0);
  if (!cats.length) return '';
  const tot = cats.reduce((n,c)=>n+c.rev,0);
  return `<div class="card">
    <div class="card-title">By channel · all time<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">Signed value grouped by the kind of source it came from.</div>
    ${cats.map(c=>`<div class="rep-row">
      <div class="rep-head">
        <div class="nm">${esc(c.category)}<span class="brand">${c.sources} source${c.sources===1?'':'s'}</span></div>
        <div class="amt">${short(c.rev)} <span>· ${c.signed} signed</span></div>
      </div>
      <div class="meter"><div class="meter-fill" style="width:${pct(c.rev,tot)}%;background:${c.category==='Unmapped'?'#8aa094':'#f0834a'}"></div></div>
      <div class="tgt-cap"><span>${pct(c.rev,tot)}% of signed value</span>
        <span>${c.jobs?Math.round(c.signed/c.jobs*100):0}% close</span></div>
    </div>`).join('')}
  </div>`;
}

/* ── 10. flags ────────────────────────────────────────────────────────────── */
/* ── NOTICE → DO, rendered ──────────────────────────────────────────────────
   One component, used by the appointments card, the flags card and every
   drill-in, so a signal reads identically wherever it surfaces. ─────────── */
const SEV = { fire:{c:'#d96a5e', k:'act today'}, watch:{c:'#d4b15a', k:'watch'}, note:{c:'#8aa094', k:'note'} };
function sigFor(tag){ return (D.signals && D.signals.list || []).filter(s => s.tags.includes(tag)); }

function signalList(sigs, { quiet } = {}){
  if (!sigs.length) return quiet ? `<div class="nofires">${esc(quiet)}</div>` : '';
  return sigs.map(s => `<div class="sig ${s.sev}">
    <div class="sig-h"><span class="sig-dot" style="background:${SEV[s.sev].c}"></span>
      <span class="sig-k">${SEV[s.sev].k}</span></div>
    <div class="sig-n">${esc(s.notice)}</div>
    <div class="sig-d"><span class="sig-arrow">→</span>${esc(s.action)}</div>
  </div>`).join('');
}

function cardFlags(){
  const W = w(), f = [];
  const X = D.exclusions;
  if (X && X.jobs) f.push(['#a98fd5', `<b>${X.jobs} jobs held out of every figure.</b> ${X.signed} of them signed, worth <b>${short(X.value)}</b> — the batch-entry anomaly Liberty's own reports already exclude${X.brands.length===1?` (all on ${esc(brandOf(X.brands[0]).n)})`:''}. Flagged, not deleted: they are real jobs, excluded from reporting so this console agrees with the reports you already trust.`]);
  const cov = pct(D.coverage.jobsWithSold, D.coverage.jobs);
  f.push(['#d4b15a', `<b>${cov}% of jobs carry a contract value.</b> ${D.coverage.jobsWithSold.toLocaleString()} of ${D.coverage.jobs.toLocaleString()} have a sold amount on them. Every dollar on this page is a floor, not a full count.`]);
  if (!qbOK()) f.push(['#d96a5e', `<b>QuickBooks is unreadable to your login.</b> ${esc(D.qb.reason)} Every QB figure on this page is withheld rather than shown as zero.`]);
  if (qbOK() && D.qb.dropped) f.push(['#d4b15a', `<b>${D.qb.dropped} QuickBooks invoices excluded.</b> Flagged reporting_excluded and kept out of invoiced and A/R alike.`]);
  const missing = qbOK() ? Object.keys(BRANDS).filter(id => !D.qb.brandsWithInvoices.includes(id)) : [];
  if (missing.length) f.push(['#d96a5e', `<b>${missing.map(id=>BRANDS[id].n).join(' and ')} ${missing.length>1?'have':'has'} no QuickBooks feed.</b> Signed value is tracked in Contractors Cloud; invoicing is not visible here at all.`]);
  if (D.effort.total < 50) f.push(['#8aa094', `<b>Effort is unlogged.</b> ${D.effort.total} touches exist. The effort card is a real zero, not a broken feed.`]);
  f.push(['#a98fd5', `<b>Goals are auto-set, not committed to.</b> Each is that brand's own ${esc(D.targets.basis)} — nobody has set a real quota yet, so "clears goal" and "short of goal" measure against recent form rather than a promise.`]);
  if (W.close === null) f.push(['#8aa094', `<b>No close rate for ${esc(W.label.toLowerCase())}.</b> No appointments in the window to divide by.`]);
  return `<div class="card full">
    <div class="card-title">Flags · read before trusting</div>
    <div class="card-sub">What would mislead you if nobody said it. These are caveats about the data, not things to act on — anything needing action is at the top of the page.</div>
    ${f.map(([c,t])=>`<div class="flag-row"><div class="flag-dot" style="background:${c}"></div><div class="ft">${t}</div></div>`).join('')}
  </div>`;
}

/* The page's answer to "what needs me today". Sits at the top because that is
   the question he opens it with. When nothing crosses a threshold it says so
   plainly — a console that always finds something wrong gets ignored. */
function cardActions(){
  const S = D.signals; if (!S) return '';
  const acts = S.list.filter(s => s.sev !== 'note');
  const notes = S.list.filter(s => s.sev === 'note');
  const headline = S.fires ? `${S.fires} thing${S.fires===1?'':'s'} to act on`
                 : S.watches ? `${S.watches} to watch` : 'No fires';
  return `<div class="card full acts ${S.fires?'hasfire':S.watches?'haswatch':'clear'}">
    <div class="card-title">What needs you${S.fires?'':' right now'}<span class="feed-tag ${S.fires?'':'none'}">${esc(headline)}</span></div>
    <div class="card-sub">Checked against this business's own recent numbers, not a rule of thumb. Nothing appears here unless it crossed a threshold.</div>
    ${signalList(acts, { quiet: 'Nothing is off today. Bookings, pipeline and money are all inside their normal range — no action needed from you this morning.' })}
    ${notes.length?`<div class="sig-sep">Worth doing when there's time</div>${signalList(notes)}`:''}
  </div>`;
}

/* ═══ PER-WINDOW DEEP DIVE ══════════════════════════════════════════════════
   One window, examined properly: its total and pace, its own trend at its own
   resolution, the brand split, the like-for-like comparison, and who signed it.
   ═════════════════════════════════════════════════════════════════════════ */
const DIVE_TITLE = { day:'Today', week:'This week', month:'This month', ytd:'Year to date' };
const DIVE_SERIES = { day:'daily', week:'daily', month:'weeks', ytd:'monthly' };
const DIVE_SERIES_LABEL = { day:'Last 14 days', week:'Last 14 days', month:'Last 3 weeks', ytd:'Last 13 months' };

/* A brand chip in each job's own colour — the console's brand palette, so Eric's
   fence row and his Oasis row read as two different colours at a glance. A job
   whose company has not resolved to a known brand gets the neutral "awaiting
   sync" chip rather than being coloured as a guess. */
function brandChip(brandId, resolved){
  if (resolved === false) return `<span class="bchip await"><span class="bdot" style="background:#8aa094"></span>awaiting sync</span>`;
  const m = brandOf(brandId);
  return `<span class="bchip" style="color:${m.c};border-color:${m.c}55"><span class="bdot" style="background:${m.c}"></span>${esc(m.s)}</span>`;
}

/* The job rows that live UNDER a rep or a brand, revealed when its row is tapped.
   Under a rep, each row shows its own brand chip (the whole point — Eric's fence
   and his Oasis job read as two colours); under a brand, it shows the rep who
   sold it instead. Everything else — customer, amount, source tag, the +N cap —
   is identical either way, so the two accordions stay honest in the same terms. */
function jobSubList(list, count, rest, { showBrand = true, showRep = false } = {}){
  if (!list || !list.length) return `<div class="acc-empty">No itemised jobs in this window.</div>`;
  return `<div class="acc-body">
    ${list.map(r => `<div class="joblrow sub">
      <div class="jobl-top">
        <div class="jobl-cust">${r.cust ? esc(r.cust) : '<span style="color:var(--text-dim)">name not on the record</span>'}</div>
        <div class="jobl-amt">${r.amount ? short(r.amount) : '$0'}</div>
      </div>
      <div class="jobl-meta">
        ${showBrand ? brandChip(r.brand, r.resolved) : ''}
        ${showRep ? `<span class="jobl-rep">${r.rep ? esc(r.rep) : (r.office ? 'office · unattributed' : 'no rep recorded')}</span>` : ''}
        <span class="feed-tag ${r.src==='billdu'?'billdu':'cc'}">live · ${r.src}</span>
      </div>
    </div>`).join('')}
    ${count > list.length ? `<div class="wfoot" style="margin-top:8px">+ ${count-list.length} more${rest?` totaling ${short(rest)}`:''} — the ${list.length} largest are listed.</div>` : ''}
  </div>`;
}

function diveView(k){
  const W = flat(k), pv = W.prev;
  const d = pv.rev ? Math.round((W.rev - pv.rev)/pv.rev*100) : null;
  const dTot = d;
  const full = spanOf(k), el = W.prevSpanDays || 1, pace = paceOf(k);
  const complete = el >= full;
  const tot = W.brands.reduce((n,b)=>n+b.rev,0);
  /* "Who signed it" is the real sellers only. The office/unattributed deals used
     to rank here as "Oasis · unattributed"; they now surface loudly in Needs an
     owner instead, so they are filtered out of this list and its bar scale. */
  const reps = (W.reps||[]).filter(r=>!r.office), mx = Math.max(1, ...reps.map(r=>r.rev));
  return `
  <div class="backbar">
    <button class="backbtn" onclick="closeWindow()">‹ Back</button>
    <div class="dive-h">${esc(DIVE_TITLE[k])}</div>
  </div>

  ${k === 'week' ? weekResetNote() : ''}

  ${(()=>{ const s = sigFor('dive:'+k);
    return s.length ? `<div class="card full acts hasfire" style="margin-bottom:12px">
      <div class="card-title">What needs you in this window</div>
      ${signalList(s)}
    </div>` : ''; })()}

  <div class="card full" style="margin-bottom:12px">
    <div class="card-title">Signed · ${esc(DIVE_TITLE[k].toLowerCase())}<span class="feed-tag cc">live · cc</span>${W.billdu?'<span class="feed-tag billdu">live · billdu</span>':''}${billduDown()?'<span class="feed-tag none">billdu unreadable</span>':''}</div>
    <div class="dive-hero">
      <div class="big">${short(W.rev)}</div>
      <div class="side">
        ${complete ? `${W.deals} deal${W.deals===1?'':'s'}` : `pace <b>${short(pace)}</b><br/>day ${el} of ${full}`}
        ${dTot===null?'' : `<br/>${dTot>=0?'▲':'▼'} ${Math.abs(dTot)}% vs ${esc(W.prevLabel)}`}
      </div>
    </div>
    ${/* The components sit ON the headline, not below the fold of the card.
          Kevin read "$5K · live·cc" as the day's sales and reported the Billdu
          money missing — it was in the total, but the total did not say so, and
          the only place the split appeared was further down. A headline that is
          a union has to declare itself a union at the point of reading. */''}
    ${W.billdu ? `<div class="hero-incl">incl. <b>${short(W.billdu)}</b> <span class="feed-tag billdu">live · billdu</span> not yet in CC</div>` : ''}
    ${billduDown() ? `<div class="hero-incl warn">Contractors Cloud only — the Billdu feed is unreadable, so any Oasis work signed in Billdu is <b>missing from this figure</b>, not absent from the day.</div>` : ''}
    ${W.billdu ? `<div class="seam">
      <span><b>${short(W.ccRev)}</b> signed in Contractors Cloud · ${W.jobs} contract${W.jobs===1?'':'s'}</span>
      <span><b>${short(W.billdu)}</b> accepted in Billdu, ${W.billduCount} Oasis deal${W.billduCount===1?'':'s'} CC has not recorded yet</span>
      ${W.suppressed?`<span class="muted">${short(W.suppressed)} of Billdu activity is already inside the CC figure and is not added again</span>`:''}
    </div>` : ''}
    <div class="card-sub" style="margin:10px 0 0">${W.appts} appointments · ${W.completed} completed${W.close===null?'':' · '+W.close+'% close on CC work'}</div>
  </div>

  ${(()=>{ const u = W.unowned || []; if (!W.unownedCount) return '';
    const rest = W.unownedCount - u.length;
    return `<div class="card full needs-owner" style="margin-bottom:12px">
      <div class="no-head">
        <span class="no-warn">⚠</span>
        <div class="no-headtext">
          <div class="no-title">Needs an owner</div>
          <div class="no-stat"><b>${W.unownedCount}</b> job${W.unownedCount===1?'':'s'} · <b>${short(W.unownedTotal)}</b> · no seller recorded</div>
        </div>
      </div>
      <div class="card-sub">Signed work with nobody credited — pulled out so it does not hide.${
        W.unownedNoRep?` <b>${W.unownedNoRep}</b> ${W.unownedNoRep===1?'is a Contractors Cloud contract with no rep on it':'are Contractors Cloud contracts with no rep on them'} — a gap to fix at the source.`:''}${
        W.unownedOffice?` <b>${W.unownedOffice}</b> ${W.unownedOffice===1?'was':'were'} sent from Oasis's office account, where the seller is not on the Billdu record.`:''}</div>
      ${u.map(r=>`<div class="joblrow sub">
        <div class="jobl-top">
          <div class="jobl-cust">${r.cust ? esc(r.cust) : '<span style="color:var(--text-dim)">name not on the record</span>'}</div>
          <div class="jobl-amt">${r.amount ? short(r.amount) : '$0'}</div>
        </div>
        <div class="jobl-meta">
          ${brandChip(r.brand, r.resolved)}
          <span class="jobl-rep">${r.reason==='office'?'office-sent · no seller':'no rep on the contract'}</span>
          <span class="feed-tag ${r.src==='billdu'?'billdu':'cc'}">live · ${r.src}</span>
        </div>
      </div>`).join('')}
      ${rest>0?`<div class="wfoot" style="margin-top:8px">+ ${rest} more${W.unownedRest?` totaling ${short(W.unownedRest)}`:''} — the ${u.length} largest are listed.</div>`:''}
    </div>`; })()}

  <div class="stack dive">
    <div class="card chart-card full">
      <div class="card-title">${esc(DIVE_SERIES_LABEL[k])}<span class="feed-tag cc">live · cc</span></div>
      <div class="card-sub">Signed value, so this window sits in its own recent history.</div>
      <div class="chart-wrap"><canvas id="cDive"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">${esc(DIVE_TITLE[k])} vs ${esc(W.prevLabel)}<span class="feed-tag cc">live · cc</span></div>
      <div class="card-sub">Like for like — ${el} day${el===1?'':'s'} against the same ${el}.</div>
      <div class="wow-hero">
        <div class="wow-col"><div class="k">${esc(W.prevLabel)}</div><div class="v">${short(pv.rev)}</div></div>
        <div class="wow-arrow"><div class="d" style="${d!==null&&d<0?'color:#d8997f':''}">${d===null?'—':(d>=0?'▲':'▼')+Math.abs(d)+'%'}</div><div class="c">${pv.jobs}→${W.jobs}</div></div>

          <div class="meter"><div class="meter-fill" style="width:${pct(b.rev,tot)}%;background:${m.c}"></div></div>
          <div class="tgt-cap">
            <span>${b.rev?pct(b.rev,tot)+'% of the window':'nothing signed in this window'}</span>
            ${b.billdu?`<span class="hit">${short(b.billdu)} via Billdu</span>`:''}
          </div>

/* ── APPOINTMENTS, inside every drill-in ────────────────────────────────────
   Kevin: "When I click on the daily report on owner dash no apt data at all…
   Both clicks into that need deeper dive info including apts and marketing."
   The drill-in should answer his morning in one screen: money, deals,
   appointments, marketing pulse. ──────────────────────────────────────────── */
function diveAppointments(k){
  const A = D.appointments; if (!A || !A.perWindow) return '';
  const p = A.perWindow[k], W = flat(k);
  const label = { day:'today', week:'this week', month:'this month', ytd:'year to date' }[k];
  const dl = (a,b) => b ? Math.round((a-b)/b*100) : null;
  const dB = dl(p.booked, p.bookedPrev), dH = dl(p.held, p.heldPrev);
  const bookedRows = Object.entries(p.bookedByBrand).sort((a,b)=>b[1]-a[1]);
  const bookedTot = bookedRows.reduce((n,[,c])=>n+c,0);
  const av = apptVerdict(A);
  return `<div class="card full">
    <div class="card-title">Appointments · ${esc(label)}<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">What the team <b>set</b> in this window, and what sat on the calendar during it. Two different questions.</div>

    <div class="stat-grid" style="margin-bottom:12px">
      <div class="stat-tile"><div class="lbl">Booked · set date</div>
        <div class="val ${p.booked?'green':''}">${p.booked}</div>
        <div class="sub">marketing output</div>
        ${dB===null?'<div class="delta flat">no prior baseline</div>':`<div class="delta ${dB>=0?'up':'down'}">${dB>=0?'▲':'▼'} ${Math.abs(dB)}% vs ${esc(W.prevLabel)}</div>`}</div>
      <div class="stat-tile"><div class="lbl">On the calendar</div>
        <div class="val blue">${p.held}</div>
        <div class="sub">appointment date</div>
        ${dH===null?'<div class="delta flat">no prior baseline</div>':`<div class="delta ${dH>=0?'up':'down'}">${dH>=0?'▲':'▼'} ${Math.abs(dH)}% vs ${esc(W.prevLabel)}</div>`}</div>
      <div class="stat-tile"><div class="lbl">Close on run</div>
        <div class="val ${W.close===null?'':'gold'}">${W.close===null?'—':W.close+'%'}</div>
        <div class="sub">${W.jobs} signed of ${W.appts} run</div>
        <div class="delta flat">CC work only</div></div>
      <div class="stat-tile"><div class="lbl">Completed</div>
        <div class="val">${W.completed}</div>
        <div class="sub">jobs finished</div>
        <div class="delta flat">in this window</div></div>
    </div>

    <div class="verdict ${av.tone}">${esc(av.line)}</div>

    ${bookedTot?`<div class="card-title" style="margin:16px 0 8px">Booked for, by brand</div>
    ${(() => {
      /* Same guard as the home card. A brand cannot be read off a booking until
         the project sync has delivered its project, and on a busy morning most
         of the day sits unresolved. Ranking brands then is not a partial answer,
         it is a wrong one — "Fencing 1 · 5%" next to "unknown 18 · 95%" reads as
         a dead morning for Fencing when Fencing had in fact booked most of it. */
      const unknown = p.bookedByBrand.unknown || 0;
      if (unknown > bookedTot / 2) return `<div class="withheld"><div class="wt">Still counting</div><div class="wx">
        <b>${unknown}</b> of ${bookedTot} booking${bookedTot===1?'':'s'} in this window are against projects the sync has not delivered yet, so the brand split would be mostly guesswork.
        The total is right; the breakdown appears once the projects land. Nothing here is missing — it is early.</div></div>`;
      return bookedRows.map(([b,n])=>{const m=brandOf(b);
        return `<div class="rep-row">
          <div class="rep-head"><div class="nm">${esc(m.n)}${b==='unknown'?'<span class="brand">awaiting project sync</span>':''}</div>
            <div class="amt">${n} <span>· ${pct(n,bookedTot)}%</span></div></div>
          <div class="meter"><div class="meter-fill" style="width:${pct(n,bookedTot)}%;background:${m.c}"></div></div>
        </div>`}).join('');
    })()}`:''}

    <div class="note"><b>Booked</b> counts when the appointment was created — what the setters produced. <b>On the calendar</b> counts when it was scheduled to happen — what the crews drove to. A busy calendar and a productive setting week are different facts, so they are never added together. Close rate is signed ÷ run on Contractors Cloud work; Billdu deals carry no CC appointment and are excluded from it.</div>
  </div>`;
}

/* ── MARKETING, inside every drill-in ─────────────────────────────────────── */
function diveMarketing(k){
  const L = D.leadSources; if (!L) return '';
  const rows = (L.windows[k] || []).slice(0, 8);
  const label = { day:'today', week:'this week', month:'this month', ytd:'year to date' }[k];
  const tot = rows.reduce((n,r)=>n+r.rev,0);
  const mx = Math.max(1, ...rows.map(r=>r.rev));
  return `<div class="card full">
    <div class="card-title">Marketing · ${esc(label)}<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">Which sources produced the signed work in this window, and how they convert overall.</div>

    ${rows.length ? rows.map(r=>{
      const all = L.allTime.find(a=>a.id===r.id);
      const conv = all && all.jobs ? Math.round(all.signed/all.jobs*100) : null;
      return `<div class="rep-row">
        <div class="rep-head">
          <div class="nm">${r.name?esc(r.name):(r.id==='none'?'No source on the job':'#'+esc(r.id))}${r.name?'':'<span class="brand">unmapped</span>'}</div>
          <div class="amt">${short(r.rev)} <span>· ${r.signed} signed</span></div>
        </div>
        <div class="meter"><div class="meter-fill" style="width:${Math.round(r.rev/mx*100)}%;background:${r.name?'#f0834a':'#8aa094'}"></div></div>
        <div class="tgt-cap"><span>${pct(r.rev,tot)}% of signed value ${esc(label)}</span>
          <span class="${conv!==null&&conv>=50?'hit':''}">${conv===null?'':conv+'% close all time'}</span></div>
      </div>`}).join('')
    : `<div class="card-sub" style="margin:0">Nothing signed ${esc(label)} to attribute to a source.</div>`}

    <div class="withheld"><div class="wt">Ad spend not connected yet</div><div class="wx">
      This shows what each source <b>produced</b>, which is half of return on investment. The other half — what each campaign <b>cost</b> — needs the Google Ads feed the backend is wiring now. Until spend lands, treat these as revenue by source, not ROI: a source can look strong here and still be losing money.</div></div>
  </div>`;
}

function openWindow(k){
  DIVE = k;
  try { history.pushState({ dive:k }, '', location.pathname + '#' + k); } catch(e){}
  render(); window.scrollTo({ top:0 });
}
function closeWindow(){
  // Prefer going back, so the history entry is consumed rather than stranded.
  if (history.state && history.state.dive) { history.back(); return; }
  DIVE = null; render(); window.scrollTo({ top:0 });
}
addEventListener('popstate', () => {
  const k = history.state && history.state.dive;
  DIVE = (k && DIVE_TITLE[k]) ? k : null;
  if (D) { render(); window.scrollTo({ top:0 }); }
});

/* ── render ───────────────────────────────────────────────────────────────── */
function render(){
  if (DIVE) {
    document.getElementById('app').innerHTML = diveView(DIVE) +
      `<div class="foot">Trust the instrument, not the retelling</div>`;
    drawCharts();
    return;
  }
  /* Headline figures for the folded rows. A fold has to keep carrying its
     number, or it stops being a fold and becomes a thing he has to remember to
     go and check. Each of these is read from the same data its card reads, so
     the row and the opened card can never disagree. */
  const _W = w();
  /* cardWow is a WEEK card — it calls wk(), not w(), and always has. Reading its
     summary from w() put the month's $736K on a row titled "this week vs last
     week". A folded row that disagrees with the card it opens is worse than no
     row at all, so this reads from wk() exactly as the card does. */
  const _Wk = wk(), _pv = _Wk.prev;
  const _d = _pv.rev ? Math.round((_Wk.rev - _pv.rev) / _pv.rev * 100) : null;
  const _mixTot = _W.brands.reduce((n, b) => n + b.rev, 0);
  const _reps = _W.reps;
  const _E = D.effort, _eT = _E.rows.reduce((n, r) => n + r[EFFWIN].t, 0);
  const _eOn = _E.rows.filter(r => r[EFFWIN].t > 0).length;
  const _cats = D.leadSources.categories.filter(c => c.rev > 0);

  document.getElementById('app').innerHTML =
    hdr() + '<div class="stack">' + [
      /* Order is a statement of what matters, and now so is what stays open.
         These six are the cockpit at cruise: what needs him, the appointments
         his week turns on, and the money already on the board. */
      cardActions(), cardAppointments(), cardApptByCompany(), cardApptTrends(),
      /* Leads by company — unfolded at Kevin's request ("break the lead sources
         by company"). It was buried in the quiet strip, which is why he could
         not find it; it is a sibling of Appointments by company, so it sits high
         in the open flow rather than behind a click at the bottom. */
      cardLeads(),
      cardWeeks(), cardStats(), cardTrending(),

      /* Everything below folds, and folds together, so they land as one quiet
         strip rather than as short rows scattered through the columns. None of
         it is less true — it is the working rather than the reading, and he
         opens it when he wants it. */
      cardCalendarLoad(),
      minor('wow', `${short(_pv.rev)} → ${short(_Wk.rev)}${_d === null ? '' : ' · ' + (_d >= 0 ? '+' : '') + _d + '%'}`, cardWow()),
      minor('mix', `${short(_mixTot)} signed`, cardMix()),
      minor('reps', _reps.length ? `${esc(_reps[0].name)} leads · ${short(_reps[0].rev)}` : 'no rep activity this month', cardReps()),
      minor('effort', `${_eT} touch${_eT === 1 ? '' : 'es'} · ${_eOn}/${_E.activeReps} reps on the board`, cardEffort()),
      minor('cadence', 'this week, by weekday', cardCadence()),
      minor('money', qbOK() ? `${short(qbw().invoiced)} invoiced · ${short(D.qb.arTotal)} open A/R` : 'withheld — not readable', cardMoney()),
      minor('leadcats', `${_cats.length} channel${_cats.length === 1 ? '' : 's'}`, cardLeadCategories()),
      minor('flags', 'caveats, not actions', cardFlags()),
    ].join('') + '</div>' +
    `<div class="foot">Trust the instrument, not the retelling<br/>
      Read ${new Date(D.generatedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})} ·
      ${D.coverage.jobs.toLocaleString()} jobs · ${D.coverage.appts.toLocaleString()} appts${qbOK()?` · ${D.qb.total.toLocaleString()} invoices`:''}
      <br/>build ${esc(BUILD)}
      <br/><button class="signout" style="margin-top:12px" onclick="signOut()">Sign out</button></div>`;
  drawCharts();
}

/* These toggles sit mid-page, so a full re-render must not throw the reader back
   to the top. Hold the scroll position across the redraw. */
function keepScroll(fn){
  const y = window.scrollY;
  fn(); render();
  window.scrollTo({ top: y });
}
function setEff(k){ keepScroll(() => { EFFWIN = k; }); }
function setApptCo(k){ keepScroll(() => { APPTCOWIN = k; }); }
function setLead(k){ keepScroll(() => { LEADWIN = k; }); }
function setTrade(b){ keepScroll(() => { LEADTRADE = b; }); }

/* ── charts. Kevin's Chart.js idiom: mono ticks, #1c3528 tooltips. ─────────
      If the CDN is blocked or offline, every chart says so out loud instead of
      leaving a confident-looking empty box. ─────────────────────────────────── */
function drawCharts(){
  while (charts.length) { try { charts.pop().destroy(); } catch(e){} }
  if (typeof Chart === 'undefined') {
    document.querySelectorAll('.chart-wrap, .alloc-chart').forEach(el => {
      el.innerHTML = '<div class="chartfail">Chart library did not load.<br/>The numbers on this page are unaffected — only the drawing is missing.</div>';
      el.style.height = 'auto';
    });
    return;
  }
  Chart.defaults.color = '#8aa094';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
  const MONO = "'JetBrains Mono', monospace";
  const TIP = { backgroundColor:'#1c3528', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:8,
                titleFont:{family:MONO,size:10}, bodyFont:{family:MONO,size:10} };

  /* appointments: past / today / booked-ahead in one shape, so the cliff between
     what ran and what is booked is visible rather than described */
  /* A number over every bar, so the daily count is readable off the chart itself
     rather than guessed from height — Kevin: "this doesn't say the daily number."
     Today's count is drawn in the accent colour with a TODAY tag above it; a
     weekend zero is dimmed so a structural zero never reads as a bad day. */
  /* THE NUMBER LIVES ON THE BAR. Kevin: "the chart pic doesn't show it… I have
     to guess based on the graph. Visuals are what people read." So every bar
     chart on this page draws its value on top of the bar, not in a caption
     beside it. Three shapes: a plain/ grouped bar labels each bar; a stacked bar
     labels the column total; a highlighted bar (today/current) draws in accent.
     A per-bar flag series is optional and only tunes colour and the TODAY tag. */
  function barLabels(chart, { series, fmt = String, todayTag = false, skipZero = false } = {}){
    const ctx = chart.ctx; ctx.save(); ctx.textAlign = 'center';
    chart.data.datasets.forEach((ds, di) => {
      if (ds.type === 'line') return;                 // skip the norm reference line
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((bar, j) => {
        const v = ds.data[j];
        if (v == null || (skipZero && Number(v) === 0)) return;
        const f = series ? series[j] : null;
        const hot = f && (f.today || f.current);
        const cool = f && (f.weekend || f.future);
        ctx.font = "600 9px 'JetBrains Mono', monospace";
        ctx.fillStyle = hot ? '#f0834a' : cool ? 'rgba(138,160,148,0.55)' : '#e8efe9';
        ctx.fillText(fmt(v), bar.x, bar.y - 5);
        if (hot && todayTag){ ctx.font = "700 7px 'JetBrains Mono', monospace"; ctx.fillStyle = '#f0834a';
          ctx.fillText('TODAY', bar.x, bar.y - 16); }
      });
    });
    ctx.restore();
  }
  const barLabelsPlugin = (opts) => ({ id:'barLabels', afterDatasetsDraw(c){ barLabels(c, opts); } });
  const stackTotalsPlugin = (fmt = String) => ({ id:'stackTotals', afterDatasetsDraw(chart){
    const ctx = chart.ctx, n = chart.data.labels.length;
    ctx.save(); ctx.textAlign = 'center'; ctx.font = "600 9px 'JetBrains Mono', monospace"; ctx.fillStyle = '#e8efe9';
    for (let i = 0; i < n; i++){ let total = 0, topY = Infinity, x = null;
      chart.data.datasets.forEach((ds, di) => { total += Number(ds.data[i]) || 0;
        const bar = chart.getDatasetMeta(di).data[i]; if (bar){ x = bar.x; if (bar.y < topY) topY = bar.y; } });
      if (total > 0 && x != null) ctx.fillText(fmt(total), x, topY - 5);
    }
    ctx.restore();
  } });

  /* booked-per-day: the setters' output. */
  const bk = document.getElementById('cBooked');
  if (bk && D.appointments) {
    const s = D.appointments.bookedSeries, norm = D.appointments.bookedNorm;
    charts.push(new Chart(bk.getContext('2d'), {
      type:'bar',
      data:{ labels:s.map(x=>[x.dow, x.label]),   // weekday letter over the date
        datasets:[
          { label:'Booked', borderRadius:3, order:1,
            backgroundColor:s.map(x=>x.today?'#f0834a':x.weekend?'rgba(138,160,148,0.22)':'#6cc28b'),
            data:s.map(x=>x.n) },
          norm ? { type:'line', label:'norm', order:0, data:s.map(()=>norm),
            borderColor:'rgba(212,177,90,0.6)', borderDash:[4,4], borderWidth:1.5, pointRadius:0, fill:false } : null
        ].filter(Boolean) },
      options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:22}},
        plugins:{ legend:{display:false},
          tooltip:{...TIP, filter:c=>c.datasetIndex===0, callbacks:{ label:c=>' '+c.parsed.y+' booked',
            afterLabel:c=>s[c.dataIndex].weekend?'weekend':(norm?`${norm}/day norm`:'') }}},
        scales:{ x:{grid:{display:false},ticks:{font:{family:MONO,size:8},color:'#8aa094',maxRotation:0,autoSkip:false}},
          y:{display:false,beginAtZero:true,grace:'12%'} } },
      plugins:[barLabelsPlugin({series:s, todayTag:true})]
    }));
  }
  for (const [id, series, colour] of [
    ['cBookedWeek',  D.appointments && D.appointments.bookedWeekly,  '#6cc28b'],
    ['cBookedMonth', D.appointments && D.appointments.bookedMonthly, '#6cc28b'],
  ]) {
    const el2 = document.getElementById(id);
    if (!el2 || !series) continue;
    charts.push(new Chart(el2.getContext('2d'), {
      type:'bar',
      data:{ labels:series.map(x=>x.label),
        datasets:[{ label:'Booked', borderRadius:3,
          backgroundColor:series.map(x=>x.current?'#f0834a':colour), data:series.map(x=>x.n) }] },
      options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:18}},
        plugins:{ legend:{display:false}, tooltip:{...TIP, callbacks:{ label:c=>' '+c.parsed.y+' booked',
          afterLabel:c=>series[c.dataIndex].current?'still filling':'' }}},
        scales:{ x:{grid:{display:false},ticks:{font:{family:MONO,size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12}},
          y:{display:false,beginAtZero:true,grace:'12%'} } },
      plugins:[barLabelsPlugin({series})]
    }));
  }

  /* on the calendar: today + the next 7 days, each bar labelled, today loud.
     Eight bars read cleanly on a phone where the old 22-bar past+future did not. */
  const ah = document.getElementById('cAhead');
  if (ah && D.appointments && D.appointments.aheadSeries) {
    const s = D.appointments.aheadSeries;
    charts.push(new Chart(ah.getContext('2d'), {
      type:'bar',
      data:{ labels: s.map(x=>[x.dow, x.label]),
        datasets:[{ label:'On the calendar', borderRadius:3,
          backgroundColor: s.map(x => x.today ? '#f0834a' : x.weekend ? 'rgba(138,160,148,0.22)' : 'rgba(107,168,201,0.8)'),
          data: s.map(x=>x.n) }] },
      options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:22}},
        plugins:{ legend:{display:false},
          tooltip:{...TIP, callbacks:{ label:c=>' '+c.parsed.y+' on the calendar',
            afterLabel:c=>s[c.dataIndex].today?'today':'booked ahead' }}},

/* ── PASSWORD RECOVERY ──────────────────────────────────────────────────────
   A recovery link can land here in either of two shapes, so both are handled:

     · implicit  — #access_token=…&refresh_token=…&type=recovery
                   (what {{ .ConfirmationURL }} produces once Supabase has
                   verified the token and redirected here)
     · token_hash — ?token_hash=…&type=recovery
                   (the newer verify-on-arrival flow)

   In both cases the token is stripped from the address bar immediately: a
   recovery token is a credential, and leaving it in the URL means it lands in
   history and in anything the user pastes. ── */
function readRecovery(){
  const hash = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const query = new URLSearchParams(location.search || '');
  const clean = () => history.replaceState(null, '', location.pathname);
  if (hash.get('type') === 'recovery' && hash.get('access_token'))
    return { kind:'implicit', access_token:hash.get('access_token'),
             refresh_token:hash.get('refresh_token'), clean };
  if (query.get('type') === 'recovery' && query.get('token_hash'))
    return { kind:'token_hash', token_hash:query.get('token_hash'), clean };
  // An expired or already-used link comes back as an error, not a token.
  const err = hash.get('error_description') || query.get('error_description');
  if (err) return { kind:'error', message: decodeURIComponent(err.replace(/\+/g,' ')), clean };
  return null;
}

/* The recovery token IS a session — a short-lived one that authorises exactly
   one thing: setting a new password. */
async function updatePassword(password){
  const s = sess.get();
  const r = await fetch(`${SB_URL}/auth/v1/user`, {
    method:'PUT', headers:{ apikey: SB_KEY, Authorization:'Bearer '+s.access_token,
                            'Content-Type':'application/json' },
    body: JSON.stringify({ password }),
  });
  const j = await r.json();
  if (!r.ok) {
    const raw = j.error_description || j.msg || j.message || '';
    // Supabase answers an expired or reused recovery link with a JWT parse
    // error. That is true and useless to the person holding the link, so it is
    // translated into the thing they can actually do about it.
    if (/jwt|token|expired|malformed|signature/i.test(raw))
      throw new Error('That reset link has expired or was already used. Request a new one below.');
    if (/weak|password/i.test(raw) && /short|least|characters/i.test(raw))
      throw new Error(raw);
    throw new Error(raw || 'could not set password');
  }
  return j;
}
