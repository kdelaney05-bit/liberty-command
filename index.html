<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

     here deliberately: this is a numbers instrument and being unable to zoom a
     chart on a phone is a real loss. Say the word and it goes back. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Liberty Command Console</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0d1f17"/>
<meta name="color-scheme" content="dark"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="icon-1024.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Command"/>
<meta name="format-detection" content="telephone=no"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════════════════
   Kevin's Liberty Command Console model, wired live.
   Everything down to the ── EXTENSIONS ── rule is his CSS verbatim.
   ═══════════════════════════════════════════════════════════════════════════ */
  :root {
    --bg-deep: #0d1f17; --bg-card: #15291f; --bg-card-hi: #1c3528;
    --line: rgba(255,255,255,0.06); --text: #e8efe9; --text-dim: #8aa094;
    --accent: #f0834a; --accent-soft: #f4a37a; --green: #6cc28b; --green-soft: #8fd5a8;
    --red: #d96a5e; --gold: #d4b15a; --blue: #6ba8c9; --violet: #a98fd5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; overflow-x: hidden; }
  body { font-family: 'Inter Tight', sans-serif; background: radial-gradient(ellipse at top, #1a3326 0%, #0d1f17 60%); background-attachment: fixed; color: var(--text); min-height: 100vh; padding: 16px; -webkit-font-smoothing: antialiased; }
  .shell { width: 100%; max-width: 480px; margin: 0 auto; }
  .hdr { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .hdr h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 18px; }
  .hdr h1 em { font-style: italic; color: var(--accent-soft); font-weight: 300; }
  .nw-block { display: flex; justify-content: space-between; align-items: flex-end; }
  .nw-block .nw-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .nw-block .nw { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; letter-spacing: -0.01em; line-height: 1; }
  .nw-block .nw-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.04em; }
  .nw-block .nw-delta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green); text-align: right; line-height: 1.5; }
  .nw-block .nw-delta b { color: var(--green-soft); font-weight: 600; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .card-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .feed-tag { display: inline-block; margin-left: 6px; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); border: 1px solid rgba(108,194,139,0.3); border-radius: 100px; padding: 1px 6px; vertical-align: middle; }
  .feed-tag.cc { color: var(--blue); border-color: rgba(107,168,201,0.3); }
  .feed-tag.qb { color: var(--gold); border-color: rgba(212,177,90,0.3); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-tile { background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .stat-tile .lbl { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .stat-tile .val { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; letter-spacing: -0.01em; line-height: 1; }
  .stat-tile .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 6px; }
  .stat-tile .val.orange { color: var(--accent-soft); } .stat-tile .val.gold { color: var(--gold); } .stat-tile .val.blue { color: var(--blue); } .stat-tile .val.green { color: var(--green-soft); }
  .stat-tile .delta { font-family: 'JetBrains Mono', monospace; font-size: 9px; margin-top: 6px; letter-spacing: 0.02em; }
  .stat-tile .delta.up { color: var(--green-soft); } .stat-tile .delta.down { color: #d8997f; } .stat-tile .delta.flat { color: var(--text-dim); }
  .wow-hero { display: flex; align-items: stretch; gap: 8px; margin: 10px 0 12px; }
  .wow-col { flex: 1; background: var(--bg-card-hi); border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; }
  .wow-col .k { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .wow-col .v { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 500; margin-top: 4px; line-height: 1; }
  .wow-col.now { border-color: rgba(108,194,139,0.4); } .wow-col.now .v { color: var(--green-soft); }
  .wow-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; }
  .wow-arrow .d { font-size: 13px; color: var(--green-soft); font-weight: 600; }
  .wow-arrow .c { font-size: 8px; color: var(--text-dim); margin-top: 2px; }
  .wow-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .wow-row:last-child { border-bottom: none; }
  .wow-row .nm { flex: 1; color: var(--text); }
  .wow-row .nums { color: var(--text-dim); width: 118px; text-align: right; }
  .wow-row .chg { width: 56px; text-align: right; font-weight: 600; }
  .wow-row .chg.up { color: var(--green-soft); } .wow-row .chg.down { color: #d8997f; }
  .pace-proj { position: absolute; left: 0; top: 0; height: 100%; border-radius: 100px; opacity: 0.32; }
  .pace-solid { position: absolute; left: 0; top: 0; height: 100%; border-radius: 100px; }
  .tgt-cap { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.04em; }
  .tgt-cap b { color: var(--text); font-weight: 600; }
  .tgt-cap .hit { color: var(--green-soft); } .tgt-cap .miss { color: #d4b15a; }
  .chart-card { padding: 16px 12px 12px; }
  .chart-card .card-title, .chart-card .card-sub { padding: 0 4px; }
  .chart-wrap { height: 190px; margin-top: 8px; } .chart-wrap.tall { height: 200px; }
  .alloc-chart { width: 140px; height: 140px; margin: 4px auto 14px; position: relative; }
  .alloc-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .alloc-center .big { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; }
  .alloc-center .lbl { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }
  .alloc-legend { display: flex; flex-direction: column; gap: 9px; }
  .alloc-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .alloc-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .alloc-row .name { flex: 1; } .alloc-row .val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .rep-row { margin-bottom: 12px; } .rep-row:last-child { margin-bottom: 0; }
  .rep-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .rep-head .nm { font-size: 13px; font-weight: 500; }
  .rep-head .nm .brand { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-left: 6px; }
  .rep-head .amt { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
  .rep-head .amt span { color: var(--text-dim); font-size: 10px; }
  .meter { height: 7px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 100px; }
  .brand-tile { background: var(--bg-card-hi); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .brand-tile:last-child { margin-bottom: 0; }
  .brand-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .brand-top .nm { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; }
  .brand-top .nm .tag { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); display: block; margin-top: 2px; }
  .brand-top .mtd { text-align: right; }
  .brand-top .mtd .v { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; }
  .brand-top .mtd .u { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .pace-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 100px; position: relative; overflow: hidden; margin-bottom: 6px; }
  .pace-fill { height: 100%; border-radius: 100px; }
  .pace-foot { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); }
  .pace-foot b { color: var(--green-soft); font-weight: 600; }
  .money-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .money-row:last-child { border-bottom: none; }
  .money-row .nm { flex: 1; font-size: 14px; font-weight: 500; }
  .money-row .col { font-family: 'JetBrains Mono', monospace; font-size: 12px; width: 92px; text-align: right; }
  .money-row .col.inv { color: var(--green-soft); } .money-row .col.ar { color: var(--accent-soft); }
  .money-head { display: flex; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .money-head .nm { flex: 1; }
  .money-head .col { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); width: 92px; text-align: right; }
  .money-totals { display: flex; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .money-totals .nm { flex: 1; color: var(--text-dim); }
  .money-totals .col { width: 92px; text-align: right; }
  .money-totals .col.inv { color: var(--green-soft); font-weight: 600; }
  .money-totals .col.ar { color: var(--accent-soft); font-weight: 600; }
  .flag-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .flag-row:last-child { border-bottom: none; }
  .flag-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .flag-row .ft { font-size: 12px; line-height: 1.5; color: var(--text-dim); }
  .flag-row .ft b { color: var(--text); font-weight: 500; }
  .foot { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; line-height: 1.7; }

/* ═══════════════════ EXTENSIONS ═══════════════════════════════════════════
   Everything below is added to carry the model into live data, desktop, and
   the sections beyond his ten cards. Nothing above this line was changed.
   ═════════════════════════════════════════════════════════════════════════ */

  body { padding: calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left)); }

  /* window toggle — his mono pill idiom, thumb-sized */
  /* ── SNAPSHOT strip. Four windows, each one a door into itself. ── */
  .snapgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  @media (min-width: 700px) { .snapgrid { grid-template-columns: repeat(4, 1fr); } }
  .snap { text-align: left; background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 13px; padding: 13px 13px 12px; cursor: pointer; min-height: 96px;
    color: var(--text); font-family: inherit; transition: border-color .15s, background .15s;
    display: flex; flex-direction: column; gap: 2px; }
  .snap:active { background: var(--bg-card-hi); transform: scale(.985); }
  .snap:hover { border-color: rgba(240,131,74,0.35); }
  .snap-k { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-dim); }
  .snap-v { font-family: 'Fraunces', serif; font-size: 27px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.05; margin-top: 3px; }
  @media (min-width: 700px) { .snap-v { font-size: 30px; } }
  .snap-s { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 3px; }
  .snap-d { font-family: 'JetBrains Mono', monospace; font-size: 9px; margin-top: 5px; letter-spacing: 0.02em; }
  .snap-d.up { color: var(--green-soft); } .snap-d.down { color: #d8997f; } .snap-d.flat { color: var(--text-dim); }
  .snaphint { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim); text-align: center; margin-top: 12px; }

  /* the seam: what the one total is made of, shown under it rather than as a
     second number that appears to contradict it */
  .seam { display: flex; flex-direction: column; gap: 5px; margin-top: 12px;
    padding-top: 11px; border-top: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); line-height: 1.5; }
  .seam b { color: var(--text); font-weight: 600; }
  .seam .muted { color: var(--text-dim); opacity: .75; }

  /* ── appointments: the card he opens this for ── */
  .appt { border-color: rgba(240,131,74,0.22); }
  /* ── NOTICE → DO ── every signal states what is off and what to do about it */
  .acts.hasfire { border-color: rgba(217,106,94,0.35); }
  .acts.haswatch { border-color: rgba(212,177,90,0.3); }
  .acts.clear { border-color: rgba(108,194,139,0.28); }
  .sig { border-left: 3px solid var(--line2); padding: 10px 0 10px 12px; margin-top: 12px; }
  .sig.fire { border-left-color: var(--red); }
  .sig.watch { border-left-color: var(--gold); }
  .sig.note { border-left-color: var(--text-dim); }
  .sig-h { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .sig-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sig-k { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-dim); }
  .sig-n { font-size: 13.5px; line-height: 1.5; color: var(--text); }
  .sig-d { font-size: 13px; line-height: 1.55; color: var(--accent-soft); margin-top: 6px;
    display: flex; gap: 7px; align-items: baseline; }
  .sig-arrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; flex-shrink: 0; opacity: .8; }
  .sig-sep { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-top: 18px; padding-top: 12px;
    border-top: 1px solid var(--line); }
  .nofires { font-size: 13.5px; line-height: 1.6; color: var(--green-soft);
    border-left: 3px solid var(--green); padding: 10px 0 10px 12px; margin-top: 10px; }

  /* the money shot — biggest number on the page */
  .hero-booked { background: var(--bg-card-hi); border: 1px solid var(--line);
    border-left: 3px solid var(--text-dim); border-radius: 12px; padding: 15px 16px; margin: 12px 0 0; }
  .hero-booked .k { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-dim); }
  .hero-booked .v { font-family: 'Fraunces', serif; font-size: 60px; font-weight: 500;
    letter-spacing: -0.03em; line-height: 1; margin: 6px 0 4px; }
  @media (min-width: 700px) { .hero-booked .v { font-size: 72px; } }
  .hero-booked .s { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .hero-booked.good { border-left-color: var(--green); } .hero-booked.good .v { color: var(--green-soft); }
  .hero-booked.warn { border-left-color: var(--gold); }  .hero-booked.warn .v { color: var(--gold); }
  .hero-booked.bad  { border-left-color: var(--red); }   .hero-booked.bad .v  { color: #e8968c; }
  .hero-booked.flat .v { color: var(--text); }
  .bookedbrands { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .bb { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03);
    border: 1px solid var(--line); border-radius: 100px; padding: 5px 11px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .bb b { color: var(--text); font-weight: 600; }
  .bbdot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }

  .apptrow { display: grid; grid-template-columns: 1fr 1.35fr; gap: 10px; margin: 12px 0 4px; }
  .apptbig { background: var(--bg-card-hi); border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px; }
  .apptbig .k { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); line-height: 1.4; }
  .apptbig .v { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1; margin-top: 5px; }
  .apptbig .s { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 5px; }
  .apptbig.ahead.good { border-color: rgba(108,194,139,0.45); } .apptbig.ahead.good .v { color: var(--green-soft); }
  .apptbig.ahead.warn { border-color: rgba(212,177,90,0.45); }  .apptbig.ahead.warn .v { color: var(--gold); }
  .apptbig.ahead.bad  { border-color: rgba(217,106,94,0.5); }   .apptbig.ahead.bad .v  { color: var(--red); }
  .apptbig.ahead.flat .v { color: var(--text); }
  .verdict { font-size: 13.5px; line-height: 1.55; margin-top: 12px; padding: 11px 13px;
    border-radius: 10px; border-left: 3px solid var(--text-dim); background: rgba(255,255,255,0.02); }
  .verdict.good { border-left-color: var(--green); color: var(--green-soft); }
  .verdict.warn { border-left-color: var(--gold); color: var(--gold); }
  .verdict.bad  { border-left-color: var(--red); color: #e8968c; }
  .verdict.flat { color: var(--text-dim); }

  /* inline seam marker on a brand row whose figure includes Billdu money */
  .tick { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent-soft); border: 1px solid rgba(240,131,74,0.4);
    border-radius: 100px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }

  /* ── per-window deep dive ── */
  .backbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .backbtn { background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px;
    color: var(--accent-soft); font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; padding: 12px 15px; min-height: 44px; cursor: pointer; }
  .backbtn:active { background: var(--bg-card-hi); }
  .dive-h { font-family: 'Fraunces', serif; font-weight: 400; font-size: 26px;
    letter-spacing: -0.02em; line-height: 1.05; }
  .dive-h em { font-style: italic; color: var(--accent-soft); font-weight: 300; }
  .dive-hero { display: flex; align-items: flex-end; justify-content: space-between;
    gap: 14px; margin-bottom: 4px; }
  .dive-hero .big { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1; }
  .dive-hero .side { font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-dim); text-align: right; line-height: 1.6; }
  .dive-hero .side b { color: var(--green-soft); font-weight: 600; }

  /* scoreboard window toggle — scoped to the effort card, not the whole page */
  .seg { display: flex; gap: 4px; background: rgba(0,0,0,0.22); border: 1px solid var(--line);
    border-radius: 10px; padding: 3px; margin: 2px 0 14px; }
  .seg button { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600; color: var(--text-dim); background: none; border: none;
    border-radius: 8px; padding: 11px 4px; min-height: 44px; cursor: pointer; transition: background .15s, color .15s; }
  .seg button.on { background: var(--accent); color: #17110c; }
  .seg button:active { transform: scale(.97); }

  /* rank chip on a scoreboard row */
  .rk { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    margin-right: 7px; font-weight: 600; }
  .rk.top { color: var(--accent); }
  /* trade heading inside the lead card */
  .tradehead { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif;
    font-size: 16px; font-weight: 500; margin: 2px 0 12px; flex-wrap: wrap; }
  .tdot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .tmeta { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-dim); margin-left: auto; }

  .lead-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
  .lead-id .unnamed { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin-left: 6px; }

  /* SEED badge — a typed number must never wear the same badge as a measured one */
  .feed-tag.seed { color: var(--violet); border-color: rgba(169,143,213,0.35); }
  /* Billdu is a third feed alongside CC and QB and gets its own colour, so a
     Billdu figure can never be mistaken for a Contractors Cloud one. */
  .feed-tag.billdu { color: var(--accent-soft); border-color: rgba(240,131,74,0.45);
    background: rgba(240,131,74,0.08); }
  .feed-tag.none { color: var(--text-dim); border-color: rgba(255,255,255,0.12); }

  /* withheld / honest-absence block */
  .withheld { background: rgba(212,177,90,0.05); border: 1px solid rgba(212,177,90,0.22);
    border-radius: 10px; padding: 12px; margin-top: 10px; }
  .withheld .wt { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .withheld .wx { font-size: 12px; line-height: 1.6; color: var(--text-dim); }
  .note { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim);
    line-height: 1.7; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
  .note b { color: var(--text); font-weight: 600; }

  /* ── login. The only thing a logged-out visitor ever sees. Carries no
        business data of any kind — no names, no numbers, no brands. ── */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px calc(20px + env(safe-area-inset-left)) calc(24px + env(safe-area-inset-bottom)); }
  .gatebox { width: 100%; max-width: 380px; }
  .gatebox h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 30px;
    letter-spacing: -0.02em; line-height: 1.05; margin: 6px 0 22px; }
  .gatebox h1 em { font-style: italic; color: var(--accent-soft); font-weight: 300; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 11px; padding: 14px; color: var(--text); font-family: 'Inter Tight', sans-serif;
    font-size: 16px; min-height: 50px; }
  .field input:focus { outline: none; border-color: rgba(240,131,74,0.5); }
  .gobtn { width: 100%; min-height: 50px; margin-top: 6px; border: none; border-radius: 11px;
    background: var(--accent); color: #17110c; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; cursor: pointer; }
  .gobtn:disabled { opacity: 0.55; cursor: default; }
  .gateerr { font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.6;
    color: var(--red); margin-top: 12px; }
  .gateerr.ok { color: var(--green-soft); }
  .linkbtn { display: block; width: 100%; margin-top: 14px; background: none; border: none;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); cursor: pointer; min-height: 44px; }
  .linkbtn:hover { color: var(--accent-soft); }
  .gatefoot { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.08em; line-height: 1.7; margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--line); }
  .loading { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.14em; text-transform: uppercase; text-align: center; padding: 60px 20px; line-height: 2; }
  .signout { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; background: transparent; color: var(--text-dim);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; cursor: pointer; min-height: 40px; }

  /* chart fallback — a chart that fails must SAY so, never leave a silent gap */
  .chartfail { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--gold);
    line-height: 1.6; padding: 22px 6px; text-align: center; }

  /* ── DESKTOP: the same cards, flowing wider. Not a squished phone. ── */
  @media (min-width: 900px) {
    body { padding: 26px 26px 40px; }
    .shell { max-width: 1180px; }
    .hdr h1 { font-size: 36px; }
    .nw-block .nw { font-size: 38px; }
    .stack { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; align-items: start; }
    .stack > .full { grid-column: 1 / -1; }
  }
  @media (min-width: 1360px) {
    .shell { max-width: 1500px; }
    .stack { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<!-- The gate. Static markup, no business data — this is the whole of what an
     unauthenticated visitor can ever see. -->
<div class="gate" id="gate" style="display:none">
  <div class="gatebox">
    <div class="eyebrow">Liberty · owner access</div>
    <h1>Liberty <em>Command</em> Console</h1>
    <form id="loginform" autocomplete="on">
      <div class="field">
        <label for="em">Email</label>
        <input id="em" type="email" inputmode="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="current-password" required />
      </div>
      <button class="gobtn" id="gobtn" type="submit">Sign in</button>
      <div class="gateerr" id="gateerr"></div>
      <button type="button" class="linkbtn" id="forgot">Forgot password?</button>
    </form>

    <!-- Shown only when the page is opened from a recovery link. -->
    <form id="resetform" autocomplete="on" style="display:none">
      <div class="card-sub" style="margin-bottom:14px">Choose a new password for <b id="whofor">your account</b>.</div>
      <div class="field">
        <label for="np">New password</label>
        <input id="np" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="field">
        <label for="np2">Confirm new password</label>
        <input id="np2" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <button class="gobtn" id="setbtn" type="submit">Set password &amp; sign in</button>
      <div class="gateerr" id="reseterr"></div>
      <button type="button" class="linkbtn" id="backtologin">Back to sign in</button>
    </form>

    <div class="gatefoot" id="gatefoot">
      Every figure is read live from the database under your own login.
      Nothing is stored in this page.
    </div>
  </div>
</div>

<div class="shell" id="app" style="display:none"></div>

<script>
/* ── formatting ───────────────────────────────────────────────────────────── */
const money = n => '$' + Math.round(n).toLocaleString('en-US');
const short = n => { const a = Math.abs(n);
  return a >= 1e6 ? '$' + (n/1e6).toFixed(2) + 'M' : a >= 1e3 ? '$' + Math.round(n/1e3) + 'K' : '$' + Math.round(n); };
const pct = (a,b) => b ? Math.round(a/b*100) : 0;
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* Brand colours per Kevin's model: Fencing green, Oasis blue, Pro-Tec gold. */
/* Contractors Cloud carries Pro-Tec (1563) and Liberty Roofing (1537) as two
   companies. They are one business — Liberty Roofing is the DBA — so they roll
   up to a single displayed brand everywhere. The raw ids stay in the data and
   stay queryable; only the display is merged. */
const ROLLUP = { '1537': '1563' };
const rollup = id => ROLLUP[String(id)] || String(id);

const BRANDS = {
  '1461': { n:'Liberty Fencing',   s:'Fencing', c:'#6cc28b' },
  '1560': { n:'Oasis Landscapes',  s:'Oasis',   c:'#6ba8c9' },
  '1563': { n:'Pro-Tec Roofing',   s:'Pro-Tec', c:'#d4b15a', rolls:['1563','1537'] },
};
/* Display order, and the guarantee that every brand appears. A brand missing
   from a mix reads as "the console is broken" rather than "they signed nothing",
   so every one of these is rendered even at zero. */
const BRAND_ORDER = ['1461','1560','1563'];
const brandOf = id => BRANDS[rollup(id)] || { n:'Unmapped '+id, s:'?'+id, c:'#8aa094', unmapped:true };

/* Fill a brand list so every known brand is present, zeros included, in a
   stable order with any unmapped ids kept on the end rather than dropped. */
function allBrands(rows){
  const by = Object.fromEntries((rows||[]).map(r => [String(r.id), r]));
  const known = BRAND_ORDER.map(id => by[id] || { id, jobs:0, rev:0, zero:true });
  const extra = (rows||[]).filter(r => !BRANDS[String(r.id)]);
  return [...known, ...extra];
}

let D = null;
// Card-scoped windows. The page as a whole stays MTD per the model; only the
// scoreboard and the lead-source table carry their own range.
let EFFWIN = 'month', LEADWIN = 'month', LEADTRADE = '1461';
// null = the snapshot home; 'day'|'week'|'month'|'ytd' = that window, full screen
let DIVE = null;
/* v1 follows the model's own windows: the month card set is monthly, the
   week-over-week card is weekly. No window toggle — that is a later iteration.
   build-console.mjs nests window totals under .company while `prev` arrives
   already flattened, so flatten here and both sides of every comparison read
   the same way. */
const flat = k => ({ ...D.windows[k], ...D.windows[k].company });
const w  = () => flat('month');
const wk = () => flat('week');
const qbOK = () => D.qb && !D.qb.unavailable;
const qbw = () => qbOK() ? D.qb.windows.month : null;
const charts = [];

/* ── header ───────────────────────────────────────────────────────────────── */
/* Full span of each window, for projecting a pace. */
function spanOf(k){
  const n = new Date();
  if (k === 'day')  return 1;
  if (k === 'week') return 7;
  if (k === 'month') return new Date(n.getFullYear(), n.getMonth()+1, 0).getDate();
  const eoy = new Date(n.getFullYear(), 11, 31);
  return Math.round((eoy - new Date(n.getFullYear(),0,1)) / 86400000) + 1;
}
function paceOf(k){
  const W = flat(k), full = spanOf(k), el = W.prevSpanDays || 1;
  return el >= full ? W.rev : W.rev / el * full;
}

/* ── SNAPSHOT: four windows at a glance, each one a door. ── */
function hdr(){
  // W.rev is already the company figure — slice() folded Billdu in at the source.
  const tiles = [['day','Today'],['week','This week'],['month','MTD'],['ytd','YTD']].map(([k,label]) => {
    const W = flat(k), pv = W.prev;
    const d = pv.rev ? Math.round((W.rev - pv.rev)/pv.rev*100) : null;
    const sub = W.billdu
      ? `${short(W.ccRev)} CC + ${short(W.billdu)} Billdu`
      : (W.prevSpanDays >= spanOf(k) ? `${W.jobs} signed` : `pace ${short(paceOf(k))}`);
    return `<button class="snap" onclick="openWindow('${k}')">
      <div class="snap-k">${esc(label)}</div>
      <div class="snap-v">${short(W.rev)}</div>
      <div class="snap-s">${sub}</div>
      <div class="snap-d ${d===null?'flat':d>=0?'up':'down'}">${d===null?'—':(d>=0?'▲':'▼')+' '+Math.abs(d)+'% vs '+esc(W.prevLabel)}</div>
    </button>`;
  }).join('');
  const anyBilldu = ['day','week','month','ytd'].some(k => flat(k).billdu > 0);
  return `<div class="hdr">
    <div class="eyebrow">Liberty · three companies</div>
    <h1>Liberty <em>Command</em> Console</h1>
    <div class="snapgrid">${tiles}</div>
    <div class="snaphint">${anyBilldu
      ? 'Signed everywhere · Contractors Cloud + Oasis via Billdu · tap to open'
      : 'Signed contract value · tap any figure to open it'}</div>
  </div>`;
}

/* ── APPOINTMENTS · the thing he actually worries about ─────────────────────
   Kevin: "Like daily weekly monthly appt are soooo important to me… It's so
   crucial to my stress. Appts good life good. Appts bad pay attention need
   more." So this sits directly under the hero, and it leads with what is ON THE
   BOOKS rather than what already ran — the forward number is the one that
   carries the worry. ─────────────────────────────────────────────────────── */
/* The setting-day verdict. Deliberately does NOT scold before the day has had a
   chance to happen — a low count at 9am is a morning, not a problem. */
function bookedVerdict(A){
  const n = A.bookedToday, norm = A.bookedNorm, d = A.bookedVsNorm;
  if (A.isWeekend) return { tone:'flat', line: n
    ? `${n} booked on a weekend — setting normally runs Monday to Friday.`
    : 'Weekend. Setting normally runs Monday to Friday.' };
  if (!norm) return { tone:'flat', line:`${n} booked today. Not enough history yet for a norm.` };
  // how far through the setting day are we? most setting happens 7am–5pm
  const h = new Date().getHours();
  const early = h < 12;
  if (d >= 25)  return { tone:'good', line:`Setters booked ${n} today — well above the ${norm}/day norm.` };
  if (d >= 10)  return { tone:'good', line:`Setters booked ${n} today — running ahead of the ${norm}/day norm.` };
  if (d > -15)  return { tone:'flat', line:`${n} booked today, against a ${norm}/day norm. Normal setting day.` };
  if (early)    return { tone:'warn', line:`${n} booked so far against a ${norm}/day norm — still early, but worth a look.` };
  if (d <= -40) return { tone:'bad',  line:`Only ${n} booked today against a ${norm}/day norm — slow setting day, check the girls.` };
  return { tone:'warn', line:`${n} booked today against a ${norm}/day norm — setting is behind.` };
}

function apptVerdict(A){
  const d = A.vsPrior;
  const stale = A.staleHours != null && A.staleHours >= 6;
  if (!A.priorAvg) return { tone:'flat', line:'Not enough booking history yet to judge the week ahead.' };
  if (d === null) return { tone:'flat', line:'No baseline to compare the week ahead against.' };
  if (d <= -35) return { tone:'bad',  line:`Booking pipeline thin heading into next week — ${A.next7} on the books against ${A.priorAvg} typical for a ${DAYNAME[new Date().getDay()]}. Worth pushing.` };
  if (d <= -15) return { tone:'warn', line:`Week ahead is light — ${A.next7} booked against ${A.priorAvg} typical. Not alarming yet, but it wants attention.` };
  if (d >= 25)  return { tone:'good', line:`Strongest week ahead in a month — ${A.next7} already on the books against ${A.priorAvg} typical.` };
  if (d >= 10)  return { tone:'good', line:`Week ahead is running ahead of normal — ${A.next7} booked against ${A.priorAvg} typical.` };
  return { tone:'flat', line:`Week ahead is about normal — ${A.next7} booked against ${A.priorAvg} typical for a ${DAYNAME[new Date().getDay()]}.` };
}
const DAYNAME = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* who the setters booked for, today */
function bookedBrandRows(A){
  const rows = Object.entries(A.bookedByBrand).sort((a,b)=>b[1]-a[1]);
  const tot = rows.reduce((n,[,c])=>n+c,0);
  if (!tot) return '';
  return `<div class="bookedbrands">${rows.map(([b,n])=>{const m=brandOf(b);
    return `<div class="bb"><span class="bbdot" style="background:${m.c}"></span>${esc(m.s)}
      <b>${n}</b></div>`}).join('')}</div>`;
}

function cardAppointments(){
  const A = D.appointments; if (!A) return '';
  const v = apptVerdict(A);
  const bv = bookedVerdict(A);
  const ahead = Object.entries(A.brandsAhead).sort((a,b)=>b[1]-a[1]);
  const totAhead = ahead.reduce((n,[,c])=>n+c,0);
  const stale = A.staleHours != null && A.staleHours >= 6;
  return `<div class="card full appt">
    <div class="card-title">Appointments<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">What ran, and what is on the books ahead.</div>

    <div class="hero-booked ${bv.tone}">
      <div class="k">New appointments booked today</div>
      <div class="v">${A.bookedToday}</div>
      <div class="s">${A.bookedNorm?`${A.bookedNorm}/day norm${A.bookedVsNorm!==null?` · ${A.bookedVsNorm>=0?'+':''}${A.bookedVsNorm}%`:''}`:'no norm yet'}
        · ${A.bookedYesterday} yesterday${A.yesterdayWasWeekend?' (weekend)':''}</div>
    </div>
    <div class="verdict ${bv.tone}">${esc(bv.line)}</div>

    ${bookedBrandRows(A)}

    <div class="chart-wrap" style="height:150px;margin-top:14px"><canvas id="cBooked"></canvas></div>
    <div class="wfoot" style="text-align:center;margin-top:2px">Booked per day · last 14 days · <b>when the appointment was set</b></div>

    <div class="apptrow" style="margin-top:18px">
      <div class="apptbig">
        <div class="k">Running today</div>
        <div class="v">${A.today}</div>
        <div class="s">${A.yesterday?`${A.yesterday} yesterday`:'none yesterday'}</div>
      </div>
      <div class="apptbig ahead ${v.tone}">
        <div class="k">On the books · next 7 days</div>
        <div class="v">${A.next7}</div>
        <div class="s">${A.priorAvg?`${A.priorAvg} typical · ${A.vsPrior>=0?'+':''}${A.vsPrior}%`:'no baseline'}</div>
      </div>
    </div>

    <div class="verdict ${v.tone}">${esc(v.line)}</div>

    <div class="chart-wrap" style="height:170px;margin-top:14px"><canvas id="cAppt"></canvas></div>
    <div class="wfoot" style="text-align:center;margin-top:2px">14 days behind · today · 7 days ahead</div>

    ${A.priorSameDay.length?`<div class="seam" style="margin-top:14px">
      <span>Same ${esc(DAYNAME[new Date().getDay()])} in prior weeks, counted the same way: ${A.priorSameDay.map(p=>`<b>${p.n}</b>`).join(' · ')}</span>
      <span class="muted">Each counts only what had been booked by that morning, so it is a fair comparison rather than a finished week against an unfinished one.</span>
    </div>`:''}

    ${totAhead?`<div class="card-title" style="margin:16px 0 8px">Booked ahead by brand</div>
    ${ahead.map(([b,n])=>{const m=brandOf(b);
      return `<div class="rep-row">
        <div class="rep-head"><div class="nm">${esc(m.n)}</div>
          <div class="amt">${n} <span>· ${pct(n,totAhead)}%</span></div></div>
        <div class="meter"><div class="meter-fill" style="width:${pct(n,totAhead)}%;background:${m.c}"></div></div>
      </div>`}).join('')}`:''}

    ${signalList(sigFor('appointments'))}

    ${stale?`<div class="withheld"><div class="wt">Read this number knowing when it was taken</div><div class="wx">
      The appointment feed last synced <b>${A.staleHours<24?`${Math.round(A.staleHours)} hours`:`${Math.round(A.staleHours/24)} days`} ago</b>. Anything booked since then is not counted here, so the week ahead can only look thinner than it is — never fuller.</div></div>`:''}

    <div class="note">Appointments are booked a median of <b>${A.leadMedianDays} days</b> ahead, which is why the forward number means something: most of a week is not booked the morning of. <b>${A.coverage.dated.toLocaleString()}</b> appointments carry a date; <b>${A.coverage.withProject.toLocaleString()}</b> resolve to a brand, and the rest are left out of the brand split rather than bucketed as unknown.</div>
  </div>`;
}

/* Two bases, never blended. "Booked" answers how hard marketing is producing;
   "calendar" answers how full the diary is. A good booking week and a full
   calendar week are different facts and can disagree. */
function cardApptTrends(){
  const A = D.appointments; if (!A) return '';
  return `<div class="card chart-card">
      <div class="card-title">Booked by week<span class="feed-tag cc">live · cc</span><span class="feed-tag none">set date</span></div>
      <div class="card-sub">How many appointments the team <b>set</b> each week — marketing output. Current week still filling.</div>
      <div class="chart-wrap"><canvas id="cBookedWeek"></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="card-title">Booked by month<span class="feed-tag cc">live · cc</span><span class="feed-tag none">set date</span></div>
      <div class="card-sub">Setting output by month. Current month is partial.</div>
      <div class="chart-wrap"><canvas id="cBookedMonth"></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="card-title">Calendar load by week<span class="feed-tag cc">live · cc</span><span class="feed-tag none">appt date</span></div>
      <div class="card-sub">How many appointments <b>sat on the calendar</b> each week — what the crews drove to. A different question from how many were set.</div>
      <div class="chart-wrap"><canvas id="cApptWeek"></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="card-title">Calendar load by month<span class="feed-tag cc">live · cc</span><span class="feed-tag none">appt date</span></div>
      <div class="card-sub">Last 12 months by appointment date. Current month is partial.</div>
      <div class="chart-wrap"><canvas id="cApptMonth"></canvas></div>
    </div>`;
}

/* ── 1. three-week closing trend, stacked by brand ────────────────────────── */
function cardWeeks(){
  const ids = [...new Set(D.weeks.flatMap(x => x.brands.map(b => b.id)))];
  return `<div class="card chart-card full">
    <div class="card-title">Three-week closing trend<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">Signed contract value by week, stacked by brand. Weeks start Monday. This card is always weekly — the window toggle does not move it.</div>
    <div class="chart-wrap tall"><canvas id="cWeeks"></canvas></div>
    <div class="note">Rightmost bar is the week in progress, so it is short by construction rather than by performance. Brands with nothing signed in a week are absent from that stack, not drawn as zero.</div>
  </div>`;
}

/* ── 2. this window vs last, per brand ────────────────────────────────────── */
function cardWow(){
  const W = wk(), pv = W.prev;
  const d = pv.rev ? Math.round((W.rev - pv.rev)/pv.rev*100) : null;
  const cur = Object.fromEntries(W.brands.map(b => [String(b.id), b.rev]));
  const prv = Object.fromEntries((pv.brands||[]).map(b => [String(b.id), b.rev]));
  // every known brand appears, plus anything unmapped that showed up
  const ids = [...new Set([...BRAND_ORDER, ...Object.keys(cur), ...Object.keys(prv)])]
    .sort((a,b) => (cur[b]||0) - (cur[a]||0));
  return `<div class="card">
    <div class="card-title">${esc(W.label)} vs ${esc(W.prevLabel)}<span class="feed-tag cc">live · cc</span></div>
    <div class="card-sub">Like for like — ${W.prevSpanDays} day${W.prevSpanDays===1?'':'s'} against the same ${W.prevSpanDays} day${W.prevSpanDays===1?'':'s'} of ${esc(W.prevLabel)}.</div>
    <div class="wow-hero">
      <div class="wow-col"><div class="k">${esc(W.prevLabel)}</div><div class="v">${short(pv.rev)}</div></div>
      <div class="wow-arrow"><div class="d" style="${d!==null&&d<0?'color:#d8997f':''}">${d===null?'—':(d>=0?'▲':'▼')+Math.abs(d)+'%'}</div><div class="c">${pv.jobs}→${W.jobs}</div></div>
      <div class="wow-col now"><div class="k">${esc(W.label)}</div><div class="v">${short(W.rev)}</div></div>
    </div>
    ${ids.length ? ids.map(id => {
      const m = brandOf(id), a = prv[id]||0, b = cur[id]||0;
      const ch = a ? Math.round((b-a)/a*100) : (b ? null : 0);
      return `<div class="wow-row">
        <div class="nm">${esc(m.s)}</div>
        <div class="nums">${short(a)} → ${short(b)}</div>
        <div class="chg ${ch===null?'':ch>=0?'up':'down'}">${ch===null?'new':(ch>=0?'+':'')+ch+'%'}</div>
      </div>`}).join('') : '<div class="note" style="border:none;padding:0;margin:0">Nothing signed in either window.</div>'}
  </div>`;
}

/* ── 3. 2x2 stat grid. CC signed and QB invoiced sit side by side and are

function cardStats(){

    const p = Math.round((a-b)/b*100);
    return `<div class="delta ${p>0?'up':p<0?'down':'flat'}">${p>0?'▲':p<0?'▼':'▬'} ${Math.abs(p)}% vs ${esc(W.prevLabel)}</div>`; };
  return `<div class="stat-grid">
    <div class="stat-tile"><div class="lbl">Signed MTD</div>
      <div class="val green">${short(W.rev)}</div><div class="sub">${W.jobs} contracts · cc</div>${dl(W.rev,pv.rev)}</div>
    <div class="stat-tile"><div class="lbl">Appts scheduled</div>
      <div class="val blue">${W.appts}</div><div class="sub">${W.close===null?'no close rate':W.close+'% closed'}</div>${dl(W.appts,pv.appts)}</div>
    <div class="stat-tile"><div class="lbl">New invoiced</div>
      ${q ? `<div class="val gold">${short(q.invoiced)}</div><div class="sub">${q.count} invoices · qb</div>${dl(q.invoiced,q.prev.invoiced)}`
          : `<div class="val" style="color:var(--text-dim)">—</div><div class="sub">not readable</div><div class="delta flat">see note below</div>`}</div>
    <div class="stat-tile"><div class="lbl">Open A/R</div>
      ${qbOK() ? `<div class="val orange">${short(D.qb.arTotal)}</div><div class="sub">${D.qb.ar.reduce((n,a)=>n+a.count,0)} open · as of now</div>
      <div class="delta flat">position, not a window</div>`

    <div class="note" style="margin:0;padding:0;border:none">

      ${qbOK() ? `<b>${D.qb.dropped}</b> of ${D.qb.total.toLocaleString()} QuickBooks invoices are flagged <b>reporting_excluded</b> and are left out of every figure here.`
               : `QuickBooks figures are <b>withheld, not zero</b> — ${esc(D.qb.reason)}`}

/* ── 4. trending to finish — booked, projected, seeded target ─────────────── */
function cardTrending(){
  const W = w();
  const now = new Date();
  const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const elapsed = W.prevSpanDays;
  const rows = allBrands(W.brands).sort((a,b) => b.rev - a.rev);
  return `<div class="card">
    <div class="card-title">Trending to finish<span class="feed-tag cc">live · cc</span><span class="feed-tag seed">targets seeded</span></div>
    <div class="card-sub">Solid is booked. The faded run-on is where this month lands if the current daily rate holds.</div>
    ${rows.length ? rows.map(b => {
      const m = brandOf(b.id);
      const proj = elapsed ? b.rev / elapsed * days : b.rev;
      const tgt = D.targets.monthly[b.id] || 0;
      const mx = Math.max(proj, tgt, b.rev, 1);
      const hit = tgt && proj >= tgt;
      return `<div class="brand-tile">
        <div class="brand-top">
          <div class="nm">${esc(m.n)}<span class="tag">${b.jobs} signed${m.unmapped?' · unmapped id':''}</span></div>

        </div>
        <div class="tgt-cap">
          <span>proj <b>${short(proj)}</b></span>

/* ── 5. signed mix donut ──────────────────────────────────────────────────── */
/* A brand at zero is a fact. A brand missing from the list is a bug the owner
   has to diagnose from the outside, so every brand is listed either way. */
function oasisNote(k){
  const lag = D.oasisLag; if (!lag) return '';
  const wv = lag.windows[k] || {};
  const f = lag.freshness || {};
  if (!wv.docs && !f.not_in_cc_yet) return '';
  return `<div class="withheld"><div class="wt">Oasis may lag</div><div class="wx">
    Oasis sells through <b>Billdu</b> and Contractors Cloud imports it late, so an Oasis zero here means
    "nothing has reached CC yet", not "nothing was sold".
    ${wv.docs ? `Billdu shows <b>${wv.docs}</b> document${wv.docs===1?'':'s'} worth <b>${short(wv.value)}</b> in this window${wv.accepted?`, <b>${wv.accepted}</b> accepted (${short(wv.acceptedValue)})`:', none accepted yet'}.` : ''}
    ${f.not_in_cc_yet ? ` Across the whole feed <b>${Number(f.not_in_cc_yet).toLocaleString()}</b> Billdu documents still have no Contractors Cloud counterpart${f.minutes_since_newest!=null?`; the newest is ${Math.round(f.minutes_since_newest)} minutes old`:''}.` : ''}
  </div></div>`;
}

/* ── OASIS DETAIL, inside the window drill-in ────────────────────────────────
   Kevin: "It's under the main don't need it there anymore if it's in the total."
   Right — once every Oasis figure already includes Billdu, a separate card at
   the top is a second version of a number he has. What is still useful is WHICH
   deals make up the Billdu portion of a window, and that belongs behind the tap
   as detail rather than above the fold as a rival headline. ───────────────── */
function oasisDetail(k){
  const L = D.oasisLag; if (!L || !L.feed) return '';
  const W = flat(k);
  const b = W.brands.find(x => String(x.id) === '1560');
  if (!b || !b.billdu) return '';
  const R = (D.windowRange || {})[k]; if (!R) return '';
  const rows = L.feed
    .filter(r => r.date >= R[0] && r.date < R[1] && r.additive)
    .sort((x,y) => (x.at < y.at ? 1 : -1));
  if (!rows.length) return '';
  const f = L.freshness || {};
  return `<div class="card">
    <div class="card-title">Oasis · what Billdu added<span class="feed-tag billdu">live · billdu</span></div>
    <div class="card-sub">The ${short(b.billdu)} inside the Oasis figure above, deal by deal. Oasis signs in Billdu and Contractors Cloud imports later, so these are signed deals CC has not recorded yet.</div>
    ${rows.slice(0,12).map(r => `<div class="rep-row">
      <div class="rep-head">
        <div class="nm">${esc(r.name||'—')}${r.city?`<span class="brand">${esc(String(r.city).trim())}</span>`:''}</div>
        <div class="amt">${short(r.value)} <span>· ${esc((r.rep||'').split(' ')[0])}</span></div>
      </div>
      <div class="tgt-cap"><span>${esc(r.date)}</span><span class="miss">not in CC yet</span></div>
    </div>`).join('')}
    ${rows.length>12?`<div class="wfoot" style="margin-top:8px">+ ${rows.length-12} more</div>`:''}
    <div class="note">An acceptance counts here only while CC has no signing for it. Once CC records the sale it moves to the CC side on CC's own date — typically a few days earlier — so this list shrinks as the import catches up.${f.minutes_since_newest!=null?` Newest Billdu document is ${Math.round(f.minutes_since_newest)} minutes old.`:''}</div>
  </div>`;
}
