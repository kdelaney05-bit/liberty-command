  /* EXCLUSIONS. Twelve jobs carry reporting_excluded — a batch-entry anomaly
     Liberty's own reports already leave out (migration 012). Counting them made
     this console disagree with the numbers Kevin already trusts, which is the
     fastest way for a dashboard to be written off as broken. They are dropped
     from every figure here and the amount dropped is stated on the page. */
  const excluded = allJobs.filter(j => j.reporting_excluded);
  const jobs = allJobs.filter(j => !j.reporting_excluded);
  const exclusions = {
    jobs: excluded.length,
    signed: excluded.filter(j => j.contract_signed_at).length,
    value: excluded.filter(j => j.contract_signed_at)
                   .reduce((n,j) => n + Number(j.fin_sold_amount||0), 0),
    reasons: [...new Set(excluded.map(j => j.reporting_exclusion_reason).filter(Boolean))],
    brands: [...new Set(excluded.map(j => rollup(j.cc_company_id)))],
  };
  const D_ = 86400000, NOW = new Date();
  const sod = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const sow = d => { const x = sod(d); x.setDate(x.getDate() - ((x.getDay()+6)%7)); return x; };
  const som = d => new Date(d.getFullYear(), d.getMonth(), 1);
  const soy = d => new Date(d.getFullYear(), 0, 1);
  const addD = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
  const addM = (d,n) => { const x = new Date(d); x.setMonth(x.getMonth()+n); return x; };
  const inR = (iso,a,b) => { if(!iso) return false; const t = new Date(iso).getTime();
    return t >= a.getTime() && t < b.getTime(); };
  const inRDate = (s,a,b) => { if(!s) return false;
    const [y,m,d] = s.slice(0,10).split('-').map(Number);
    const t = new Date(y, m-1, d).getTime(); return t >= a.getTime() && t < b.getTime(); };

  const WINS = {
    day:  { label:'Today',        from:sod(NOW), to:addD(sod(NOW),1), pFrom:addD(sod(NOW),-1), pTo:sod(NOW), pLabel:'yesterday' },
    week: { label:'This week',    from:sow(NOW), to:addD(sow(NOW),7), pFrom:addD(sow(NOW),-7), pTo:sow(NOW), pLabel:'last week' },
    month:{ label:'This month',   from:som(NOW), to:addM(som(NOW),1), pFrom:addM(som(NOW),-1), pTo:som(NOW), pLabel:'last month' },
    ytd:  { label:'Year to date', from:soy(NOW), to:addD(sod(NOW),1), pFrom:soy(addM(soy(NOW),-1)), pTo:addM(sod(NOW),-12), pLabel:'same point last year' },
  };
  const elapsedDays = w => Math.max(1, Math.ceil((Math.min(NOW.getTime(), w.to.getTime()) - w.from.getTime()) / D_));
  const prevRange = w => [w.pFrom, new Date(Math.min(w.pFrom.getTime() + elapsedDays(w)*D_, w.pTo.getTime()))];
  const repById = Object.fromEntries(reps.map(r => [r.id, r]));

  /* ── THE UNION, APPLIED AT THE SOURCE ───────────────────────────────────
     Kevin: "it's not in the actual daily/monthy/yearly tab when I click it.
     Oasis empty there. Not populating over."

     He was right, and the reason was structural: the union was bolted onto the
     headline while every brand aggregate underneath still counted CC only. So
     the fix belongs in slice(), where brands are built — one place, and every
     surface that reads a brand or a window total inherits it: the snapshot, the
     drill-ins, brand mix, week-over-week, trending, the trend charts.

     An acceptance is additive only where Contractors Cloud has NOT recorded a
     signing for it — matched to a CC project is not the same as signed. ───── */
  const ccSignedMap = (billdu && billdu.ccSigned) || null;
  const bFeed = (billdu && billdu.feed) || null;
  const OASIS = '1560';
  const ymdOf = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  /* Billdu author → rep, taken from the backend's own rep_id rather than from
     the author NAME. The distinction matters: Oasis's office account sends
     estimates on a seller's behalf, so the document's author is not the person
     who sold the work, and that account is not a rep at all. Fuzzy name matching
     would have credited those deals to a similarly-named manager who had nothing
     to do with them. Where rep_id is null the deal is shown as office-sent and
     unattributed, which is the honest answer rather than a plausible one. */
  const bRepOf = Object.fromEntries(
    ((billdu && billdu.docs) || []).map(d => [String(d.billdu_id), d.rep_id || null]));
  const OFFICE = '__office';

  const billduAdd = (a, b) => {
    if (!bFeed) return null;
    const A = ymdOf(a), B = ymdOf(b);
    const rows = bFeed.filter(r => { const d = String(r.signed_date_et).slice(0,10); return d >= A && d < B; });
    const add = rows.filter(r => !r.job_id || ccSignedMap[r.job_id] !== true);
    // per-rep split of the additive money, so leaderboards can inherit it
    const byRep = {};
    for (const r of add) {
      const rid = bRepOf[String(r.billdu_id)] || OFFICE;
      (byRep[rid] ??= { value:0, count:0 });
      byRep[rid].value += Number(r.accepted_value||0);
      byRep[rid].count++;
    }
    return { value: add.reduce((n,r)=>n+Number(r.accepted_value||0),0),
             count: add.length,
             suppressed: rows.filter(r => r.job_id && ccSignedMap[r.job_id] === true)
                             .reduce((n,r)=>n+Number(r.accepted_value||0),0),
             byRep, rows: add };
  };

  function slice(a,b){
    const js = jobs.filter(j => inR(j.contract_signed_at,a,b));
    const as = appts.filter(x => inR(x.starts_at,a,b));
    const done = jobs.filter(j => inR(j.completed_at,a,b));
    const rev = js.reduce((n,j)=>n+Number(j.fin_sold_amount||0),0);
    const brands = {}, byRep = {};
    for (const j of js) {
      const b2 = rollup(j.cc_company_id || 'unknown');
      (brands[b2] ??= { jobs:0, rev:0 }); brands[b2].jobs++; brands[b2].rev += Number(j.fin_sold_amount||0);
      if (j.rep_id) { (byRep[j.rep_id] ??= { jobs:0, rev:0, appts:0 });
        byRep[j.rep_id].jobs++; byRep[j.rep_id].rev += Number(j.fin_sold_amount||0); }
    }
    for (const x of as) if (x.rep_id) { (byRep[x.rep_id] ??= { jobs:0, rev:0, appts:0 }); byRep[x.rep_id].appts++; }

    // Fold Billdu into Oasis here, so no downstream card has to remember to.
    const bd = billduAdd(a,b);
    if (bd && (bd.value || bd.count)) {
      (brands[OASIS] ??= { jobs:0, rev:0 });
      brands[OASIS].rev += bd.value;
      brands[OASIS].jobs += bd.count;
      brands[OASIS].billdu = bd.value;
      brands[OASIS].billduCount = bd.count;
      // and into rep attribution, or a seller reads $0 on a day they sold
      for (const [rid, v] of Object.entries(bd.byRep)) {
        (byRep[rid] ??= { jobs:0, rev:0, appts:0 });
        byRep[rid].rev += v.value;
        byRep[rid].jobs += v.count;
        byRep[rid].billdu = (byRep[rid].billdu || 0) + v.value;
        byRep[rid].billduCount = (byRep[rid].billduCount || 0) + v.count;
      }
    }
    const unionRev = rev + (bd ? bd.value : 0);

    return {
      // rev is the COMPANY figure — both systems. ccRev keeps the seam readable.
      company:{ jobs:js.length, rev: unionRev, ccRev: rev,
                billdu: bd ? bd.value : 0, billduCount: bd ? bd.count : 0,
                suppressed: bd ? bd.suppressed : 0,
                deals: js.length + (bd ? bd.count : 0),
                appts:as.length, completed:done.length,
                // close rate stays CC-over-CC: Billdu deals carry no CC appointment,
                // and mixing them would inflate it.
                close: as.length ? Math.round(js.length/as.length*100) : null,
                avgJob: js.length ? Math.round(rev/js.length) : 0 },
      brands: Object.entries(brands).map(([id,v])=>({id,...v})),
      reps: Object.entries(byRep).map(([id,v])=>({
        id,
        name: id === OFFICE ? 'Oasis · unattributed'
                            : (repById[id]?.name ?? 'Unknown'),
        role: id === OFFICE ? 'office-sent' : (repById[id]?.role ?? 'sales'),
        office: id === OFFICE,
        ...v,
        // close rate is CC-over-CC; a Billdu deal carries no CC appointment
        close: v.appts ? Math.round((v.jobs - (v.billduCount||0))/v.appts*100) : null,
      })).filter(r=>r.rev>0||r.appts>0).sort((x,y)=>y.rev-x.rev),
    };
  }

  // Brands that exist at all, for seeding targets. The per-brand collected/open
  // balances this used to compute are not rendered anywhere since the builds and
  // markets cards went, so their columns are no longer fetched — that is ~1MB of
  // phone payload saved rather than downloaded and discarded.
  const brandIds = [...new Set(jobs.map(j => rollup(j.cc_company_id || 'unknown')))];

  const weeks = [];
  for (let i=2;i>=0;i--){
    const a = addD(sow(NOW), -7*i), b = addD(a,7);
    const js = jobs.filter(j=>inR(j.contract_signed_at,a,b));
    const br = {};
    for (const j of js){ const k = rollup(j.cc_company_id||'unknown');
      (br[k] ??= {rev:0,jobs:0}); br[k].rev += Number(j.fin_sold_amount||0); br[k].jobs++; }
    // same union in the stacked trend, or the chart contradicts the headline
    const wbd = billduAdd(a,b);
    if (wbd && wbd.value) { (br[OASIS] ??= {rev:0,jobs:0});
      br[OASIS].rev += wbd.value; br[OASIS].jobs += wbd.count; }
    weeks.push({ label:`${a.getMonth()+1}/${a.getDate()}`, current:i===0, jobs:js.length,
      rev: js.reduce((n,j)=>n+Number(j.fin_sold_amount||0),0) + (wbd?wbd.value:0),
      brands: Object.entries(br).map(([id,v])=>({id,...v})) });
  }
  /* Trend series for the per-window drill-ins. Each window gets a shape that
     actually says something at its own resolution: a day reads against the last
     two weeks of days, a year against its months. */
  const daily = [];
  for (let i = 13; i >= 0; i--) {
    const a = addD(sod(NOW), -i), b = addD(a, 1);
    const js = jobs.filter(j => inR(j.contract_signed_at, a, b));
    const bd = billduAdd(a,b);
    daily.push({ label: `${a.getMonth()+1}/${a.getDate()}`, current: i === 0,
      jobs: js.length + (bd?bd.count:0),
      rev: js.reduce((n,j)=>n+Number(j.fin_sold_amount||0),0) + (bd?bd.value:0) });
  }
  const monthly = [];
  for (let i = 12; i >= 0; i--) {
    const a = addM(som(NOW), -i), b = addM(a, 1);
    const js = jobs.filter(j => inR(j.contract_signed_at, a, b));
    const bd = billduAdd(a,b);
    monthly.push({ label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][a.getMonth()],
      current: i === 0, jobs: js.length + (bd?bd.count:0),
      rev: js.reduce((n,j)=>n+Number(j.fin_sold_amount||0),0) + (bd?bd.value:0) });
  }

  const cadence = (() => {
    const a = sow(NOW), names = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    return names.map((label,n) => { const d0 = addD(a,n), d1 = addD(d0,1);
      return { label, appts: appts.filter(x=>inR(x.starts_at,d0,d1)).length,
               signed: jobs.filter(j=>inR(j.contract_signed_at,d0,d1)).length,
               future: d0.getTime() > NOW.getTime() }; });
  })();
  /* ═══ APPOINTMENTS ══════════════════════════════════════════════════════
     Kevin: "Appts good life good. Appts bad pay attention need more."

     The number that carries the anxiety is not how many ran — it is how many are
     ON THE BOOKS ahead. Two things had to be checked before this could say
     anything useful:

     · Booking lead time is a median of 3 days, p90 of 7. So Liberty does book
       ahead, and a thin week ahead is a real signal rather than just how the
       business runs.
     · A raw "next 7 days" count compared against how full past weeks ENDED is
       apples to oranges — most of a week gets booked during that week. The
       comparison is therefore reconstructed as-of: what was on the books on the
       same weekday in earlier weeks, counting only what had been booked by then.

     And the appointment sync is not continuous, so the card prints how stale it
     is. Telling him bookings are thin using half-day-old data would be alarming
     him about bookings that may already exist. ─────────────────────────────── */
  const appointments = (() => {
    const live = appts.filter(a => a.starts_at && !a.is_internal);
    const projBrand = {};
    for (const j of jobs) if (j.cc_project_id) projBrand[String(j.cc_project_id)] = rollup(j.cc_company_id);
    const at = a => new Date(a.starts_at);
    const inD = (a, x, y) => { const t = at(a); return t >= x && t < y; };
    const count = (x, y) => live.filter(a => inD(a, x, y)).length;

    /* Contractors Cloud stores these as Eastern local time but LABELS them UTC.
       Checked rather than assumed: both starts_at and cc_created_at cluster
       07:00–17:00 "UTC" with nothing between 19:00 and 06:00. Real UTC would put
       Eastern business hours at 12:00–22:00. So parsing them as UTC and letting
       the browser convert shifts every timestamp four hours earlier.

       It happens not to break day buckets — business hours minus four hours is
       still the same calendar day — but relying on that is luck, not design. Day
       comparisons therefore use the DATE PORTION OF THE STRING, which is the
       business date CC intended, whatever the offset claims. */
    const dstr = ts => String(ts || '').slice(0, 10);
    const ymdL = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    // as-of: only what had been created by `asOf`
    const bookedAsOf = (asOf, days) => live.filter(a => {
      const t = at(a);
      if (!(t >= asOf && t < addD(asOf, days))) return false;
      if (a.cc_created_at && new Date(a.cc_created_at) > asOf) return false;
      return true;
    }).length;

    const T = sod(NOW);

    /* ── BOOKED TODAY · the setters' output ────────────────────────────────
       Kevin: "Liked booked today is my key indicator. I check my marketing
       girls… That's the money shot. Daily new appts."

       This counts appointments CREATED today, which is a different question
       from how full the calendar is: it measures what the setting team produced
       today, not what the crews are driving to. Both bases are kept and both
       are labelled, because confusing them would make a busy calendar look like
       a productive morning. ─────────────────────────────────────────────── */
    const createdOn = day => appts.filter(a => a.cc_created_at && dstr(a.cc_created_at) === day);
    const todayStr = ymdL(T), yestStr = ymdL(addD(T,-1));
    const bookedTodayRows = createdOn(todayStr);
    const bookedToday = bookedTodayRows.length;
    const bookedYesterday = createdOn(yestStr).length;

    // Weekday norm: weekends are structurally zero here and would drag a plain
    // average down until every weekday looked like a win.
    const normDays = [];
    for (let i = 1; i <= 28; i++) {
      const d = addD(T, -i);
      if (d.getDay() === 0 || d.getDay() === 6) continue;
      normDays.push(createdOn(ymdL(d)).length);
    }
    const sortedNorm = [...normDays].sort((x,y)=>x-y);
    const bookedNorm = sortedNorm.length ? sortedNorm[Math.floor(sortedNorm.length/2)] : 0;
    const isWeekend = T.getDay() === 0 || T.getDay() === 6;

    const bookedByBrand = {};
    for (const a of bookedTodayRows) {
      const b = projBrand[String(a.cc_project_id)] || 'unknown';
      bookedByBrand[b] = (bookedByBrand[b] || 0) + 1;
    }

    /* Per-brand weekday norms. Needed before any "this brand is quiet" alert can
       be trusted: measured over the last 56 days, Fencing books a median of 14 a
       weekday and Oasis 6, but Pro-Tec books 1. A brand whose normal IS
       near-zero cannot support a daily alarm — "below 40% of a median of 1" only
       ever means "zero", which happens on a tenth of normal days. So the norm is
       carried per brand and the alert gates on having enough baseline to mean
       something. */
    const brandNorm = {};
    for (const b of BRAND_ORDER) {
      const v = [];
      for (let i = 1; i <= 56; i++) {
        const d = addD(T, -i);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        v.push(createdOn(ymdL(d)).filter(a => (projBrand[String(a.cc_project_id)]||'unknown') === b).length);
      }
      v.sort((x,y)=>x-y);
      brandNorm[b] = { median: v.length ? v[Math.floor(v.length/2)] : 0, days: v.length };
    }

    // creation-basis series, alongside the calendar-load series
    const bookedSeries = [];
    for (let i = 13; i >= 0; i--) { const d = addD(T,-i);
      bookedSeries.push({ label:`${d.getMonth()+1}/${d.getDate()}`, n:createdOn(ymdL(d)).length,
                          today:i===0, weekend:d.getDay()===0||d.getDay()===6 }); }
    const bookedWeekly = [];
    for (let i = 7; i >= 0; i--) {
      const a0 = addD(sow(NOW), -7*i); let n = 0;
      for (let k = 0; k < 7; k++) n += createdOn(ymdL(addD(a0,k))).length;
      bookedWeekly.push({ label:`${a0.getMonth()+1}/${a0.getDate()}`, n, current:i===0 }); }
    const bookedMonthly = [];
    for (let i = 11; i >= 0; i--) {
      const a0 = addM(som(NOW), -i), b0 = addM(a0,1); let n = 0;
      for (let d = new Date(a0); d < b0; d = addD(d,1)) n += createdOn(ymdL(d)).length;
      bookedMonthly.push({ label:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][a0.getMonth()],
                           n, current:i===0 }); }

    const next7 = bookedAsOf(T, 7);
    // same weekday, three weeks back, measured the same way
    const priorSameDay = [1,2,3].map(w => {
      const d = addD(T, -7*w);
      return { label: `${d.getMonth()+1}/${d.getDate()}`, n: bookedAsOf(d, 7) };
    });
    const priorAvg = priorSameDay.length
      ? Math.round(priorSameDay.reduce((n,p)=>n+p.n,0)/priorSameDay.length) : 0;

    // 14 days behind + 7 ahead, so the cliff is visible in one shape
    const series = [];
    for (let i = 13; i >= 1; i--) { const d = addD(T,-i);
      series.push({ label:`${d.getMonth()+1}/${d.getDate()}`, n:count(d,addD(d,1)), when:'past' }); }
    series.push({ label:`${T.getMonth()+1}/${T.getDate()}`, n:count(T,addD(T,1)), when:'today' });
    for (let i = 1; i <= 7; i++) { const d = addD(T,i);
      series.push({ label:`${d.getMonth()+1}/${d.getDate()}`, n:count(d,addD(d,1)), when:'ahead' }); }

    const weekly = [];
    for (let i = 7; i >= 0; i--) { const a = addD(sow(NOW), -7*i), b = addD(a,7);
      weekly.push({ label:`${a.getMonth()+1}/${a.getDate()}`, n:count(a,b), current:i===0 }); }
    const monthlyA = [];
    for (let i = 11; i >= 0; i--) { const a = addM(som(NOW), -i), b = addM(a,1);
      monthlyA.push({ label:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][a.getMonth()],
        n:count(a,b), current:i===0 }); }

    const byBrandWin = (x,y) => { const o = {};
      for (const a of live) { if (!inD(a,x,y)) continue;
        const b = projBrand[String(a.cc_project_id)] || 'unknown';
        o[b] = (o[b]||0)+1; }
      return o; };

    const synced = live.map(a=>a.synced_at).filter(Boolean).sort();
    const newest = synced[synced.length-1] || null;
    const staleHours = newest ? (Date.now() - new Date(newest).getTime())/3600000 : null;

    return {
      // creation basis — what the setters produced
      bookedToday, bookedYesterday, bookedNorm, isWeekend,
      // a Sunday zero is structural, not a bad day — say which it is
      yesterdayWasWeekend: [0,6].includes(addD(T,-1).getDay()),
      bookedVsNorm: bookedNorm ? Math.round((bookedToday - bookedNorm)/bookedNorm*100) : null,
      bookedByBrand, bookedSeries, bookedWeekly, bookedMonthly, brandNorm,
      lastCreatedAt: bookedTodayRows.map(a=>a.cc_created_at).sort().pop() || null,
      // calendar basis — what the crews are driving to
      today: count(T, addD(T,1)),
      yesterday: count(addD(T,-1), T),
      next7, priorSameDay, priorAvg,
      vsPrior: priorAvg ? Math.round((next7 - priorAvg)/priorAvg*100) : null,
      series, weekly, monthly: monthlyA,
      brandsAhead: byBrandWin(T, addD(T,7)),
      brandsMonth: byBrandWin(som(NOW), addD(T,1)),
      windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => [k, count(wv.from, wv.to)])),

      /* Per-window appointment detail for the drill-ins. Kevin: "When I click on
         the daily report on owner dash no apt data at all." Both bases are
         carried per window — what was SET in it, and what SAT on the calendar in
         it — plus the same figures a window back so each can be compared. */
      perWindow: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => {
        const bookedIn = (x,y) => { let n = 0, by = {};
          for (let d = new Date(x); d < y; d = addD(d,1)) {
            for (const r of createdOn(ymdL(d))) { n++;
              const b = projBrand[String(r.cc_project_id)] || 'unknown';
              by[b] = (by[b]||0)+1; } }
          return { n, by }; };
        const heldBy = byBrandWin(wv.from, wv.to);
        const [pa,pb] = prevRange(wv);
        const b = bookedIn(wv.from, wv.to), pbk = bookedIn(pa, pb);
        return [k, {
          booked: b.n, bookedByBrand: b.by, bookedPrev: pbk.n,
          held: count(wv.from, wv.to), heldByBrand: heldBy,
          heldPrev: count(pa, pb),
        }];
      })),
      leadMedianDays: 3,
      coverage: { total: appts.length, dated: live.length,
                  withProject: live.filter(a=>projBrand[String(a.cc_project_id)]).length },
      syncedAt: newest, staleHours,
    };
  })();

  const targets = (() => {
    const monthly = {};
    for (const b2 of brandIds) {
      let sum = 0;
      for (let i=3;i>=1;i--){ const a = addM(som(NOW),-i), z = addM(a,1);
        sum += jobs.filter(j=>rollup(j.cc_company_id)===b2 && inR(j.contract_signed_at,a,z))
                   .reduce((n,j)=>n+Number(j.fin_sold_amount||0),0); }
      monthly[b2] = Math.round(sum/3);
    }
    return { source:'seeded', basis:'trailing 3 full months, per brand',
      note:'Targets are seeded, not yet set. Nothing in Contractors Cloud or QuickBooks carries a goal, so these are each brand’s own recent average — a baseline to beat, not a number anybody committed to.',
      monthly };
  })();

  const effort = (() => {
    const wt = Object.fromEntries(playComponents.map(p=>[p.key,p.weight]));
    const goals = Object.fromEntries(repTargets.map(t=>[t.rep_id,t]));
    const todayA = sod(NOW), todayB = addD(todayA,1);
    const weekA = sow(NOW), weekB = addD(weekA,7);
    const monthA = som(NOW), monthB = addM(monthA,1);
    const yearA = soy(NOW), yearB = addD(sod(NOW),1);
    const blank = () => ({ day:{t:0,p:0}, week:{t:0,p:0}, month:{t:0,p:0}, year:{t:0,p:0}, all:0, plays:{} });
    const byRep = {};
    for (const t of touches){
      const k = t.rep_id || 'unknown';
      const r = (byRep[k] ??= blank()); const pts = wt[t.play]||0;
      r.all++; r.plays[t.play] = (r.plays[t.play]||0)+1;
      const bump = b2 => { b2.t++; b2.p += pts; };
      if (inR(t.occurred_at,yearA,yearB)) bump(r.year);
      if (inR(t.occurred_at,monthA,monthB)) bump(r.month);
      if (inR(t.occurred_at,weekA,weekB)) bump(r.week);
      if (inR(t.occurred_at,todayA,todayB)) bump(r.day);
    }
    const active = reps.filter(r=>r.active);
    const rows = active.map(r => { const v = byRep[r.id]||blank(); const g = goals[r.id];
      return { name:r.name, initials:r.initials, role:r.role,
        goal: g?.daily_touch_goal ?? null, goalSource: g?.goal_source ?? null,
        today:v.day.t, week:v.week.t, month:v.month.t, points:v.month.p, ...v }; })
      .sort((a,b2)=>b2.month.t-a.month.t || b2.all-a.all || a.name.localeCompare(b2.name));
    const bizDays = (a,b2) => { let n=0;
      for (let d=new Date(a); d<b2 && d<=NOW; d=addD(d,1)) if (d.getDay()>=1&&d.getDay()<=5) n++;
      return Math.max(1,n); };
    return { total:touches.length, activeReps:active.length,
      repsEverLogged: rows.filter(r=>r.all>0).length,
      goalsAllDefault: repTargets.length>0 && repTargets.every(t=>!t.goal_source),
      defaultGoal: repTargets[0]?.daily_touch_goal ?? 10,
      plays: playComponents.map(p=>({key:p.key,title:p.title,weight:p.weight})),
      spans: { day: NOW.getDay()>=1&&NOW.getDay()<=5 ? 1 : 0,
               week: bizDays(weekA,weekB), month: bizDays(monthA,monthB), year: bizDays(yearA,yearB) },
      rows };
  })();

  /* Lead sources, now with real names. The map covers most jobs but not all, and
     the gap is money rather than a rounding error — unmapped ids keep their row
     and are labelled as unmapped instead of being folded into "other". */
  const leadSources = (() => {
    const map = Object.fromEntries(leadNames.map(e => [String(e.cc_lead_id), e]));
    const agg = (pred) => { const a = {};
      for (const j of jobs){ const k = String(j.cc_lead_source_id || 'none');
        (a[k] ??= { id:k, jobs:0, signed:0, rev:0,
                    name: map[k]?.name || null,
                    category: map[k]?.category || null,
                    inferred: map[k]?.category_from === 'inferred' });
        a[k].jobs++;
        if (pred(j)) { a[k].signed++; a[k].rev += Number(j.fin_sold_amount||0); } }
      return Object.values(a); };
    const allTime = agg(j=>!!j.contract_signed_at).sort((x,y)=>y.rev-x.rev);
    const namedRev = allTime.filter(r=>r.name).reduce((n,r)=>n+r.rev,0);
    const totalRev = allTime.reduce((n,r)=>n+r.rev,0);
    // by category, all-time — the question "which channel earns" as opposed to
    // "which individual source"
    const byCat = {};
    for (const r of allTime) {
      const c = r.category || 'Unmapped';
      (byCat[c] ??= { category:c, jobs:0, signed:0, rev:0, sources:0 });
      byCat[c].jobs += r.jobs; byCat[c].signed += r.signed; byCat[c].rev += r.rev; byCat[c].sources++;
    }
    return {
      total: jobs.length,
      distinct: new Set(jobs.map(j=>j.cc_lead_source_id).filter(Boolean)).size,
      mapped: allTime.filter(r=>r.name).length,
      mapSize: leadNames.length,
      jobsNamed: jobs.filter(j=>map[String(j.cc_lead_source_id)]).length,
      namedRevShare: totalRev ? Math.round(namedRev/totalRev*100) : 0,
      inferredCount: leadNames.filter(e=>e.category_from==='inferred').length,
      categories: Object.values(byCat).sort((a,b)=>b.rev-a.rev),
      allTime,
      windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) =>
        [k, agg(j=>inR(j.contract_signed_at,wv.from,wv.to)).filter(r=>r.signed>0).sort((x,y)=>y.rev-x.rev)])),
      /* Per trade. Fencing and roofing buy leads in different markets at
         different prices, so a blended company-wide list averages away the only
         comparison that matters. Keyed by the ROLLED-UP brand, so Pro-Tec and
         Liberty Roofing are one trade here as everywhere else. */
      byTrade: Object.fromEntries(BRAND_ORDER.map(bid => {
        const mine = jobs.filter(j => rollup(j.cc_company_id) === bid);
        const aggT = (pred) => { const a = {};
          for (const j of mine){ const k = String(j.cc_lead_source_id || 'none');
            (a[k] ??= { id:k, jobs:0, signed:0, rev:0,
                        name: map[k]?.name || null, category: map[k]?.category || null,
                        inferred: map[k]?.category_from === 'inferred' });
            a[k].jobs++;
            if (pred(j)) { a[k].signed++; a[k].rev += Number(j.fin_sold_amount||0); } }
          return Object.values(a); };
        const allT = aggT(j=>!!j.contract_signed_at).sort((x,y)=>y.rev-x.rev);
        const revT = allT.reduce((n,r)=>n+r.rev,0);
        return [bid, {
          jobs: mine.length,
          distinct: new Set(mine.map(j=>j.cc_lead_source_id).filter(Boolean)).size,
          namedIds: allT.filter(r=>r.name).length,
          namedRevShare: revT ? Math.round(allT.filter(r=>r.name).reduce((n,r)=>n+r.rev,0)/revT*100) : 0,
          allTime: allT,
          windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) =>
            [k, aggT(j=>inR(j.contract_signed_at,wv.from,wv.to)).filter(r=>r.signed>0).sort((x,y)=>y.rev-x.rev)])),
        }];
      })) };
  })();

  /* QuickBooks. qb_invoices currently has RLS policies but no GRANT to the
     authenticated role, so this 403s for every logged-in user. Reported as
     unreadable rather than drawn as zero — a missing grant and no money are
     very different facts. */
  const qb = qbError ? { unavailable:true, reason:qbError } : (() => {
    const live = qbInv.filter(i=>!i.reporting_excluded);
    const qbWin = (a,b2) => { const rows = live.filter(i=>inRDate(i.txn_date,a,b2));
      const byBrand = {};
      for (const i of rows){ const k = i.cc_company_id ? rollup(i.cc_company_id) : 'unclassified';
        (byBrand[k] ??= {invoiced:0,count:0}); byBrand[k].invoiced += Number(i.total_amt||0); byBrand[k].count++; }
      return { invoiced: rows.reduce((n,i)=>n+Number(i.total_amt||0),0), count:rows.length, byBrand }; };
    const arByBrand = {};
    for (const i of live){ const bal = Number(i.balance||0); if (bal<=0) continue;
      const k = i.cc_company_id ? rollup(i.cc_company_id) : 'unclassified';
      (arByBrand[k] ??= {ar:0,count:0}); arByBrand[k].ar += bal; arByBrand[k].count++; }
    return { unavailable:false, dropped: qbInv.length-live.length, total: qbInv.length,
      brandsWithInvoices: [...new Set(live.map(i=>i.cc_company_id).filter(Boolean).map(rollup))],
      ar: Object.entries(arByBrand).map(([id,v])=>({id,...v})),
      arTotal: Object.values(arByBrand).reduce((n,v)=>n+v.ar,0),
      windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) =>
        [k, { ...qbWin(wv.from,wv.to), prev: qbWin(...prevRange(wv)) }])) };
  })();

  /* Billdu is Oasis's real point of sale. Contractors Cloud imports it late, so
     "Oasis signed nothing" in CC can be true and still be the wrong picture.
     This carries what Billdu itself saw in each window so the zero can be
     qualified rather than presented as the whole story. */
  const oasisLag = (() => {
    if (!billdu || !billdu.docs) return null;
    const live = billdu.docs.filter(x => Number(x.total_price) > 0);
    const win = (a,b) => {
      const rows = live.filter(x => inR(x.issue_date, a, b));
      const acc = rows.filter(x => x.is_accepted);
      return { docs: rows.length,
               accepted: acc.length,
               acceptedValue: acc.reduce((n,x)=>n+Number(x.total_price||0),0),
               value: rows.reduce((n,x)=>n+Number(x.total_price||0),0),
               notInCc: rows.filter(x=>!x.job_id).length };
    };
    /* Oasis signings as Billdu itself records them. An accepted estimate is the
       signature — that is the moment the customer said yes, whatever CC has
       imported. Dates come from the view already resolved to Eastern, so they
       are compared as plain date strings rather than re-parsed into a timezone. */
    const sign = (billdu.signings || []).map(r => ({
      date: String(r.signed_date_et).slice(0,10),
      acceptances: Number(r.acceptances||0),
      value: Number(r.accepted_value||0),
      linked: Number(r.linked_to_cc||0),
      notInCc: Number(r.not_in_cc_yet||0),
    }));
    const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const sumBetween = (fromD, toD) => {
      const a = ymd(fromD), b = ymd(toD);
      const rows = sign.filter(r => r.date >= a && r.date < b);
      return { acceptances: rows.reduce((n,r)=>n+r.acceptances,0),
               value: rows.reduce((n,r)=>n+r.value,0),
               notInCc: rows.reduce((n,r)=>n+r.notInCc,0),
               days: rows.length };
    };
    return {
      freshness: billdu.fresh || null,
      windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => [k, win(wv.from, wv.to)])),
      // signings, by the same windows the rest of the console uses
      signings: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => [k, sumBetween(wv.from, wv.to)])),
      signingsPrev: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => [k, sumBetween(...prevRange(wv))])),
      daily: sign.sort((a,b)=>a.date<b.date?1:-1).slice(0,14),
      feed: (billdu.feed || []).map(r => ({
        name: r.client_name, city: r.client_city, rep: r.rep,
        value: Number(r.accepted_value||0), at: r.accepted_at,
        date: String(r.signed_date_et).slice(0,10),
        matched: r.match_status === 'linked', inCc: !!r.job_id,
        // the same predicate the totals use: matched to a CC project is not the
        // same as signed in CC, and only the unsigned ones were added
        additive: !r.job_id || ccSignedMap[r.job_id] !== true,
      })),
    };
  })();

  /* ═══ SIGNALS · NOTICE → DO ═════════════════════════════════════════════
     Kevin, as standing house law: "We need to build in as much proactive
     forward thinking intelligence as possible. Don't rely on me to think of what
     to do it clearly tells me what to not only notice but do."

     So every signal carries both halves: what is off, and the thing to do about
     it. Three rules keep it honest rather than noisy:

     · THRESHOLD-GATED, NO INVENTED CONCERNS. Every trigger below is measured
       against this business's own recent distribution, not a number that felt
       about right. Where the data cannot support a judgement the signal does not
       fire at all.
     · A QUIET DAY IS A REAL ANSWER. If nothing crosses a threshold the verdict
       is "no fires", not a scraped-together worry. A console that always finds
       something wrong teaches him to stop reading it.
     · IT MUST NOT SCOLD BEFORE THE DAY HAS HAPPENED. Daily setting alerts hold
       until the afternoon; a slow 9am is a morning, not a problem.
     ═════════════════════════════════════════════════════════════════════════ */
  const signals = (() => {
    const S = [];
    const add = (sev, id, tags, notice, action) => S.push({ sev, id, tags, notice, action });
    const A = appointments, hour = NOW.getHours();
    const isWeekday = ![0,6].includes(NOW.getDay());
    const afternoon = hour >= 13;

    // ── data trust comes first: if the feed is stale, say so before anything
    //    derived from it is used to make a decision
    if (A && A.staleHours != null && A.staleHours >= 6) {
      add('watch', 'sync-stale', ['appointments','flags'],
        `The appointment feed last synced ${A.staleHours < 24 ? Math.round(A.staleHours)+' hours' : Math.round(A.staleHours/24)+' days'} ago.`,
        `Today's booking count can only read low. Treat it as provisional until the sync catches up rather than acting on it.`);
    }

    // ── setting output today (afternoon only, weekdays only)
    if (A && isWeekday && afternoon && A.bookedNorm >= 5) {
      const r = A.bookedToday / A.bookedNorm;
      if (r < 0.5) add('fire', 'booking-day-low', ['appointments','flags','dive:day'],
        `Only ${A.bookedToday} appointments booked today against a ${A.bookedNorm}/day norm.`,
        `Get the setters on the phone this afternoon — a day this far behind does not recover on its own.`);
      else if (r < 0.75) add('watch', 'booking-day-soft', ['appointments','flags','dive:day'],
        `${A.bookedToday} booked today, below the ${A.bookedNorm}/day norm.`,
        `Worth a check-in with the setters before the day closes.`);
    }

    // ── the week ahead
    if (A && A.priorAvg >= 8 && A.vsPrior !== null) {
      if (A.vsPrior <= -35) add('fire', 'booking-week-thin', ['appointments','flags','dive:week'],
        `Only ${A.next7} appointments on the books for the next 7 days, against ${A.priorAvg} typical.`,
        `Push setting for next week today — the calendar is filled 3 days out on average, so a thin week ahead is still fixable this afternoon.`);
      else if (A.vsPrior <= -20) add('watch', 'booking-week-soft', ['appointments','flags','dive:week'],
        `${A.next7} on the books for next 7 days against ${A.priorAvg} typical.`,
        `Keep an eye on it — one more setting push today closes the gap.`);
    }

    // ── per-brand setting, only where the brand has enough baseline to judge
    if (A && isWeekday && afternoon) {
      for (const b of BRAND_ORDER) {
        const norm = (A.brandNorm && A.brandNorm[b]) || { median: 0 };
        if (norm.median < 4) continue;   // a brand whose normal is ~1 cannot signal daily
        const n = A.bookedByBrand[b] || 0;
        if (n < norm.median * 0.4) {
          const m = BRANDS[b] || { n: b };
          add('watch', 'brand-booking-' + b, ['appointments','flags','dive:day'],
            `${m.n} booked ${n} appointment${n===1?'':'s'} today against ${norm.median} typical.`,
            `Point the setters at ${m.n} for the rest of the day — the other brands are carrying the count.`);
        }
      }
    }

    // ── Oasis work that has not reached Contractors Cloud
    if (oasisLag && oasisLag.freshness && Number(oasisLag.freshness.not_in_cc_yet) > 200) {
      add('watch', 'oasis-import', ['flags','dive:month'],
        `${Number(oasisLag.freshness.not_in_cc_yet).toLocaleString()} Billdu documents still have no Contractors Cloud counterpart.`,
        `Chase the CC import. Until it catches up, Oasis work is only visible here through Billdu, and anything downstream of CC — scheduling, production, commissions — has not seen it.`);
    }

    // ── money owed, measured against what a month actually bills
    if (qb && !qb.unavailable) {
      const invMonth = qb.windows.month ? qb.windows.month.invoiced : 0;
      if (invMonth > 0 && qb.arTotal > invMonth * 1.25) {
        add('watch', 'ar-heavy', ['flags','dive:month'],
          `Open A/R is ${short(qb.arTotal)} against ${short(invMonth)} invoiced this month — more than a month of billing outstanding.`,
          `Put someone on collections this week; the oldest balances are the ones that stop being collectable.`);
      }
    }

    // ── the effort board cannot fill itself
    if (effort && effort.total < 50) {
      add('note', 'effort-unlogged', ['flags'],
        `Only ${effort.total} touches logged by ${effort.repsEverLogged} of ${effort.activeReps} reps.`,
        `The effort scoreboard stays at zero until reps log in the app. Either the habit needs pushing or the app is not in their hands yet — worth finding out which.`);
    }

    // ── marketing money attributed to a bare id
    if (leadSources && leadSources.byTrade) {
      for (const b of BRAND_ORDER) {
        const T2 = leadSources.byTrade[b]; if (!T2) continue;
        const unnamedRev = T2.allTime.filter(r=>!r.name).reduce((n,r)=>n+r.rev,0);
        if (T2.namedRevShare < 60 && unnamedRev > 250000) {
          const m = BRANDS[b] || { n: b };
          add('note', 'sources-unnamed-' + b, ['flags','dive:ytd'],
            `${short(unnamedRev)} of ${m.n}'s signed value sits on lead-source ids with no name.`,
            `Name its top ids in cc_enum_map — until then you can see which sources earn but not which ones to buy more of.`);
        }
      }
    }

    // ── close rate falling against the like-for-like prior window
    const wm = slice(WINS.month.from, WINS.month.to).company;
    const wp = slice(...prevRange(WINS.month)).company;
    if (wm.close !== null && wp.close !== null && wp.close >= 20 && wm.close < wp.close * 0.7) {
      add('watch', 'close-drop', ['flags','dive:month'],
        `Close rate is ${wm.close}% this month against ${wp.close}% last.`,
        `Same appointments, fewer contracts — look at what changed in the pitch or the lead mix before it costs another month.`);
    }

    const order = { fire: 0, watch: 1, note: 2 };
    S.sort((a,b) => order[a.sev] - order[b.sev]);
    return { list: S,
             fires: S.filter(s=>s.sev==='fire').length,
             watches: S.filter(s=>s.sev==='watch').length,
             forTag: tag => S.filter(s => s.tags.includes(tag)) };
  })();

  return {
    generatedAt: new Date().toISOString(),
    oasisLag, exclusions, signals,
    coverage: { jobs: jobs.length, appts: appts.length,
      apptsWithRep: appts.filter(a=>a.rep_id).length, touches: touches.length,
      // Coverage of the field every dollar on this page is actually built from.
      jobsWithSold: jobs.filter(j=>Number(j.fin_sold_amount)>0).length },
    weeks, daily, monthly, cadence, targets, effort, leadSources, qb, appointments,
    // window bounds as plain YYYY-MM-DD, so the Billdu feed (whose dates are
    // already resolved to Eastern) can be filtered without re-parsing timezones
    windowRange: Object.fromEntries(Object.entries(WINS).map(([k,wv]) =>
      [k, [ymdOf(wv.from), ymdOf(wv.to)]])),
    windows: Object.fromEntries(Object.entries(WINS).map(([k,wv]) => [k, {
      label: wv.label, prevLabel: wv.pLabel, prevSpanDays: elapsedDays(wv),
      ...slice(wv.from, wv.to),
      prev: (p => ({ ...p.company, brands:p.brands }))(slice(...prevRange(wv))),
    }])),
  };
}

async function loadAll(){
  appEl.innerHTML = `<div class="loading">Reading live<br/>Contractors Cloud · QuickBooks</div>`;
  showApp();
  // Only the columns something on the page actually renders. Every extra field
  // here is weight a phone carries on every open.
  const [jobs, appts, reps, touches, repTargets, playComponents, leadNames] = await Promise.all([
    // reporting_excluded comes down WITH the rows rather than being filtered in
    // the query, so the console can say how much it left out instead of silently
    // showing a smaller number than last time.
    q('jobs?select=cc_company_id,cc_project_id,rep_id,contract_signed_at,completed_at,cc_lead_source_id,fin_sold_amount,reporting_excluded,reporting_exclusion_reason&source=eq.cc'),
    // cc_created_at is what makes a like-for-like booking comparison possible:
    // "what was on the books last Monday" has to count only what was booked BY
    // last Monday, not what the week eventually filled with.
    q('cc_appointments?select=rep_id,starts_at,cc_project_id,cc_created_at,synced_at,is_internal'),
    q('reps?select=id,name,initials,role,active'),
    q('touches?select=rep_id,play,occurred_at'),
    q('rep_targets?select=rep_id,daily_touch_goal,goal_source'),
    q('score_components?select=key,title,weight&kind=eq.touch&order=ordinal'),
    // The real lead-source name map: 22 rows, name + category + whether the
    // category came from Kevin or was inferred.
    q('lead_sources?select=cc_lead_id,name,category,category_from'),
  ]);
  // Oasis sells through Billdu and Contractors Cloud imports it late, so a CC
  // zero for Oasis is not the same claim as "Oasis sold nothing". Optional:
  // if the feed is not readable the console simply does not make the claim.
  let billdu = null;
  try {
    const [fresh, docs, signings, feed] = await Promise.all([
      q('console_billdu_freshness?select=*'),
      // rep_id is the backend's OWN mapping of a Billdu author to a rep. It is
      // set for sellers who send their own estimates and deliberately NULL for
      // the office accounts, so an office-sent deal is never credited to a
      // seller who did not sell it.
      q('billdu_documents?select=billdu_id,doc_type,is_accepted,total_price,issue_date,job_id,rep_id,author'),
      // Oasis's real signings: an accepted Billdu estimate IS the signature.
      q('console_oasis_signings_live?select=*'),
      // the whole feed, not a page of it — the union needs every acceptance,
      // and 769 rows is nothing next to the jobs table
      q('console_oasis_signings_feed?select=billdu_id,client_name,client_city,rep,accepted_value,accepted_at,signed_date_et,match_status,job_id&order=accepted_at.desc'),
    ]);
    // Whether the CC side has actually recorded a signing for a linked job.
    // Every Billdu link is an Oasis job, so this stays a small fetch.
    const oasisJobs = await q('jobs?select=id,contract_signed_at&source=eq.cc&cc_company_id=eq.1560');
    billdu = { fresh: fresh[0] || null, docs, signings, feed,
               ccSigned: Object.fromEntries(oasisJobs.map(j => [j.id, !!j.contract_signed_at])) };
  } catch(e){ billdu = null; }
  let qbInv = [], qbError = null;
  try { qbInv = await q('qb_invoices?select=cc_company_id,txn_date,total_amt,balance,reporting_excluded'); }
  catch(e){ qbError = e.status === 403
    ? 'qb_invoices is not readable by your login. The table has row-level security policies but no SELECT grant to the authenticated role, so it returns 403 rather than rows. This is a one-line backend grant, not missing money.'
    : e.message; }
  D = buildData({ jobs, appts, reps, touches, repTargets, playComponents,
    leadNames, qbInv, qbError, billdu });
  render();
}

/* Reload once if the server has a newer build than the one running. Guarded by a
   sessionStorage flag so a version.json that never matches cannot loop. */
async function checkBuild(){
  try {
    const r = await fetch('version.json?cb=' + Date.now(), { cache:'no-store' });
    if (!r.ok) return;
    const j = await r.json();
    if (j.build && j.build !== BUILD && !sessionStorage.getItem('lcc.reloaded')) {
      sessionStorage.setItem('lcc.reloaded', j.build);
      location.reload();
    }
  } catch(e){}
}

/* A home-screen app is usually resumed, not loaded — Kevin's stale screenshot
   was taken twelve minutes after a good build went live, with the app already
   open. Checking only on load never reaches that case, so re-check whenever the
   page comes back to the foreground. */
addEventListener('visibilitychange', () => { if (!document.hidden) checkBuild(); });

/* ── boot ─────────────────────────────────────────────────────────────────── */
checkBuild();
document.getElementById('loginform').addEventListener('submit', async ev => {
  ev.preventDefault();
  const btn = document.getElementById('gobtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  document.getElementById('gateerr').textContent = '';
  try {
    await signIn(document.getElementById('em').value.trim(), document.getElementById('pw').value);
    await loadAll();
  } catch(e){
    showGate(e.message);
  } finally { btn.disabled = false; btn.textContent = 'Sign in'; }
});

/* forgot password */
document.getElementById('forgot').addEventListener('click', async () => {
  const el = document.getElementById('gateerr');
  const email = document.getElementById('em').value.trim();
  if (!email) { el.className = 'gateerr'; el.textContent = 'Enter your email above first, then tap Forgot password.'; return; }
  el.className = 'gateerr'; el.textContent = 'Sending…';
  try {
    await sendReset(email);
    el.className = 'gateerr ok';
    // Deliberately not "we sent it to that address" — that would confirm which
    // addresses have accounts to anyone who can reach this page.
    el.textContent = 'If that address has an account, a reset link is on its way. The link opens this page.';
  } catch(e){ el.className = 'gateerr'; el.textContent = e.message; }
});

/* leaving the reset form drops the recovery session — it authorises a password
   change, so it should not outlive the attempt to use it */
document.getElementById('backtologin').addEventListener('click', () => {
  sess.clear();
  document.getElementById('resetform').style.display = 'none';
  document.getElementById('loginform').style.display = '';
  document.getElementById('gatefoot').textContent =
    'Every figure is read live from the database under your own login. Nothing is stored in this page.';
  document.getElementById('reseterr').textContent = '';
});

/* set-new-password */
document.getElementById('resetform').addEventListener('submit', async ev => {
  ev.preventDefault();
  const err = document.getElementById('reseterr'), btn = document.getElementById('setbtn');
  const a = document.getElementById('np').value, b = document.getElementById('np2').value;
  err.className = 'gateerr';
  if (a !== b) { err.textContent = 'Those two do not match.'; return; }
  if (a.length < 8) { err.textContent = 'Use at least 8 characters.'; return; }
  btn.disabled = true; btn.textContent = 'Setting…';
  try {
    await updatePassword(a);
    document.getElementById('resetform').style.display = 'none';
    await loadAll();                       // recovery session is a real session
  } catch(e){
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Set password & sign in';
  }
});

(async () => {
  // Recovery is checked BEFORE any stored session, or arriving on a reset link
  // while already signed in would silently skip the reset.
  const rec = readRecovery();
  if (rec) {
    rec.clean();
    if (rec.kind === 'error') { showGate(rec.message + ' — request a new link below.'); return; }
    try {
      let email = null;
      if (rec.kind === 'implicit') {
        sess.set({ access_token: rec.access_token, refresh_token: rec.refresh_token, email: null });
      } else {
        const j = await exchangeTokenHash(rec.token_hash);
        sess.set({ access_token: j.access_token, refresh_token: j.refresh_token, email: j.user?.email || null });
        email = j.user?.email || null;
      }
      if (!email) {
        // Read the address back so the form can say whose account this is.
        try {
          const u = await (await fetch(`${SB_URL}/auth/v1/user`, { headers:{ apikey: SB_KEY,
            Authorization:'Bearer '+sess.get().access_token } })).json();
          email = u.email || null;
          if (email) sess.set({ ...sess.get(), email });
        } catch(e){}
      }
      showReset(email);
    } catch(e){ sess.clear(); showGate(e.message + ' — request a new link below.'); }
    return;
  }
  if (!sess.get()) { showGate(); return; }
  try { await loadAll(); }
  catch(e){
    if (/expired|not signed in|401/i.test(e.message)) { sess.clear(); showGate('Session expired — sign in again.'); }
    else {
      appEl.innerHTML = `<div class="hdr"><div class="eyebrow">Liberty · owner access</div>
        <h1>Liberty <em>Command</em> Console</h1></div>
        <div class="card"><div class="card-title">Could not load</div>
        <div class="card-sub">${esc(e.message)}</div>
        <div class="note">Nothing is shown rather than something stale.
        <button class="signout" style="margin-top:10px" onclick="signOut()">Sign out</button></div></div>`;
      showApp();
    }
  }
})();
</script>
